const util=r=>r.allocs.reduce((s,a)=>s+a.pct,0);
const availPct=r=>100-util(r);
const availHrs=r=>Math.round((100-util(r))/100*CAP);

/* ── primitives ───────────────────────────────────────────────────── */
function Dot({c}){return <span style={{width:6,height:6,borderRadius:99,background:c,display:"inline-block"}}/>;}
const toneFor=s=>({Active:C.ok,Planning:C.accent,Delayed:C.err,Completed:C.ink3,"On-Hold":C.warn,
  Pending:C.accent,Approved:C.ok,Rejected:C.err,Draft:C.ink3,Submitted:C.accent,
  High:C.warn,Medium:C.accent,Low:C.ink3,Billable:C.ok,"Non-Billable":C.ink3}[s]||C.ink3);
function Tag({s,strong}){const c=toneFor(s);return <span style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:12,color:strong?c:C.ink2,whiteSpace:"nowrap"}}><Dot c={c}/>{s}</span>;}
function Notice({tone,title,body,icon}){const c=tone==="err"?C.err:tone==="ok"?C.ok:tone==="warn"?C.warn:C.accent;
  return <div style={{padding:"11px 14px",background:C.surface,border:`1px solid ${C.line}`,borderLeft:`2px solid ${c}`,display:"flex",gap:10,alignItems:"flex-start"}}>
    {icon&&<span style={{marginTop:1}}><Icon n={icon} size={15} color={c}/></span>}
    <div><div style={{fontSize:13,fontWeight:600,color:C.ink}}>{title}</div>{body&&<div style={{fontSize:12.5,color:C.ink2,marginTop:3,lineHeight:1.5}}>{body}</div>}</div></div>;}
function Panel({title,sub,right,children,pad=true}){return <section style={{border:`1px solid ${C.line}`,borderRadius:8,background:C.surface}}>
  {title&&<div style={{padding:"14px 16px",borderBottom:`1px solid ${C.line}`,display:"flex",justifyContent:"space-between",alignItems:"center",gap:12}}>
    <div><div style={{fontSize:13,fontWeight:600,color:C.ink}}>{title}</div>{sub&&<div style={{fontSize:12,color:C.ink3,marginTop:2}}>{sub}</div>}</div>{right}</div>}
  <div style={pad?{padding:16}:undefined}>{children}</div></section>;}
function KPI({label,value,note,tone}){return <div style={{border:`1px solid ${C.line}`,borderRadius:8,background:C.surface,padding:"14px 16px"}}>
  <div style={{fontSize:11.5,color:C.ink3}}>{label}</div><div className="num" style={{fontSize:23,fontWeight:600,color:C.ink,marginTop:6,letterSpacing:"-0.02em"}}>{value}</div>
  {note&&<div style={{fontSize:11.5,color:tone||C.ink3,marginTop:3,display:"flex",alignItems:"center",gap:6}}>{tone&&<Dot c={tone}/>}{note}</div>}</div>;}
/* capacity bar: utilized (accent) + over (warn) + available (line) */
function CapBar({u}){const over=u>100;const cap=Math.min(100,u);
  return <div style={{height:6,background:C.line,borderRadius:99,overflow:"hidden",display:"flex"}}>
    <div style={{width:`${cap}%`,background:over?C.warn:C.accent}}/>{over&&<div style={{width:`${Math.min(40,u-100)}%`,background:C.err}}/>}</div>;}
const th={fontSize:11,fontWeight:600,color:C.ink3,padding:"10px 10px",textAlign:"left",borderBottom:`1px solid ${C.line}`,whiteSpace:"nowrap"};
const td={fontSize:13,color:C.ink2,padding:"11px 10px",textAlign:"left",borderBottom:`1px solid ${C.line}`,verticalAlign:"middle"};
const btnGhost={border:`1px solid ${C.line}`,background:C.surface,color:C.ink2,padding:"7px 12px",fontSize:12.5,fontWeight:500,borderRadius:6,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:6};
const btnPrimary={border:"none",background:C.ink,color:"#fff",padding:"8px 16px",fontSize:13,fontWeight:600,borderRadius:6,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:7};
const inputStyle={width:"100%",border:`1px solid ${C.lineStrong}`,borderRadius:6,padding:"9px 11px",fontSize:13.5,color:C.ink};
function Select({value,onChange,opts}){return <select className="txt" value={value} onChange={e=>onChange(e.target.value)} style={{border:`1px solid ${C.line}`,borderRadius:6,padding:"7px 10px",fontSize:12.5,color:C.ink,background:C.surface,cursor:"pointer"}}>{opts.map(o=><option key={o}>{o}</option>)}</select>;}
function SearchBox({value,onChange,ph}){return <div style={{display:"flex",alignItems:"center",gap:8,border:`1px solid ${C.line}`,borderRadius:6,padding:"7px 10px",background:C.surface,minWidth:190}}>
  <Icon n="search" size={14} color={C.ink3}/><input value={value} onChange={e=>onChange(e.target.value)} placeholder={ph} style={{border:"none",outline:"none",fontSize:12.5,color:C.ink,background:"transparent",width:"100%"}}/></div>;}
function Empty({msg}){return <div style={{padding:"34px 16px",textAlign:"center",color:C.ink3,fontSize:13,border:`1px dashed ${C.lineStrong}`,borderRadius:8}}>{msg}</div>;}
const Field=({label,children,hint})=> <div style={{marginBottom:13}}><div style={{fontSize:12,color:C.ink2,marginBottom:5}}>{label}</div>{children}{hint&&<div style={{fontSize:11,color:C.ink3,marginTop:4}}>{hint}</div>}</div>;
function Drawer({title,onClose,children,footer,width=460}){return <>
  <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(20,20,25,.2)",zIndex:80}}/>
  <aside style={{position:"fixed",top:0,right:0,height:"100%",width,maxWidth:"95%",background:C.surface,borderLeft:`1px solid ${C.line}`,zIndex:90,display:"flex",flexDirection:"column"}}>
    <div style={{padding:"16px 22px",borderBottom:`1px solid ${C.line}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span style={{fontSize:14,fontWeight:600,color:C.ink}}>{title}</span>
      <button className="ghost" onClick={onClose} style={{border:"none",background:"none",borderRadius:6,padding:5,cursor:"pointer"}}><Icon n="x" size={16} color={C.ink2}/></button></div>
    <div style={{padding:22,overflowY:"auto",flex:1}}>{children}</div>
    {footer&&<div style={{padding:"14px 22px",borderTop:`1px solid ${C.line}`,display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>{footer}</div>}</aside></>;}
function Modal({title,onClose,children,footer}){return <div style={{position:"fixed",inset:0,zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
  <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(20,20,25,.22)"}}/>
  <div style={{position:"relative",background:C.surface,border:`1px solid ${C.line}`,borderRadius:10,width:440,maxWidth:"100%",boxShadow:"0 8px 30px rgba(0,0,0,.14)"}}>
    <div style={{padding:"14px 18px",borderBottom:`1px solid ${C.line}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span style={{fontSize:14,fontWeight:600,color:C.ink}}>{title}</span>
      <button className="ghost" onClick={onClose} style={{border:"none",background:"none",borderRadius:6,padding:4,cursor:"pointer"}}><Icon n="x" size={16} color={C.ink2}/></button></div>
    <div style={{padding:18}}>{children}</div>
    {footer&&<div style={{padding:"12px 18px",borderTop:`1px solid ${C.line}`,display:"flex",justifyContent:"flex-end",gap:8}}>{footer}</div>}</div></div>;}
function useToast(){const [t,setT]=useState(null);const show=(m,tone="ok")=>{setT({m,tone,k:Date.now()});setTimeout(()=>setT(null),2600);};
  const node=t?<div key={t.k} style={{position:"fixed",bottom:20,right:20,zIndex:120,background:C.ink,color:"#fff",padding:"10px 16px",borderRadius:8,fontSize:13,boxShadow:"0 6px 20px rgba(0,0,0,.2)",display:"flex",alignItems:"center",gap:9,animation:"tin .2s ease"}}>
    {t.tone==="ok"&&<Icon n="check" size={15} color="#8fd6a5"/>}{t.tone==="err"&&<Icon n="alert" size={15} color="#e7a3a3"/>}{t.m}</div>:null;
  return [node,show];}

/* ── reusable resource capacity card ─────────────────────────────── */
function ResourceCapacity({r,action}){const u=util(r);const over=u>100;
  return <div style={{border:`1px solid ${over?C.warn:C.line}`,borderRadius:8,background:C.surface,padding:"14px 16px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
      <div><div style={{fontSize:13.5,fontWeight:600,color:C.ink}}>{r.name}</div><div style={{fontSize:12,color:C.ink3}}>{r.role} · {r.dept}</div></div>
      {action}</div>
    <div style={{display:"flex",flexWrap:"wrap",gap:5,margin:"10px 0"}}>{r.skills.map(s=><span key={s} style={{fontSize:11,color:C.ink2,border:`1px solid ${C.line}`,borderRadius:5,padding:"2px 7px"}}>{s}</span>)}</div>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:11.5,marginBottom:5}}>
      <span style={{color:C.ink2}}>Utilized <b className="num" style={{color:over?C.warn:C.ink}}>{u}%</b></span>
      <span style={{color:C.ink3}} className="num">{over?`over by ${u-100}% (${availHrs(r)}h)`:`${availPct(r)}% free · ${availHrs(r)}h`}</span></div>
    <CapBar u={u}/>
    <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.line}`}}>
      {r.allocs.length===0?<div style={{fontSize:11.5,color:C.ink3}}>No current allocations.</div>:

  const list=pool.filter(r=>(dept==="All departments"||r.dept===dept)&&(role==="All roles"||r.role===role)&&(skill==="All skills"||r.skills.includes(skill))
    &&availHrs(r)>=availThresh&&util(r)<utilCap&&(r.name+r.role+r.skills.join()).toLowerCase().includes(q.toLowerCase()));
  const setPct=(id,v)=>setPicked(p=>({...p,[id]:{...p[id],pct:v,hours:hrs(v),billable:p[id].billing==="Non-Billable"?0:hrs(v)}}));
  const setF=(id,k,v)=>setPicked(p=>({...p,[id]:{...p[id],[k]:v}}));
  const setBilling=(id,b)=>setPicked(p=>({...p,[id]:{...p[id],billing:b,billable:b==="Non-Billable"?0:(p[id].billable||p[id].hours)}}));
  const toggle=id=>setPicked(p=>{const n={...p};if(n[id])delete n[id];else n[id]={pct:25,hours:hrs(25),billable:hrs(25),billing:"Billable"};return n;});
  const pickedIds=Object.keys(picked);
  const next=()=>setStep(s=>s+1);const back=()=>setStep(s=>s-1);
  const addFiles=fl=>{const arr=Array.from(fl);const bad=[];setFiles(prev=>{const nx=[...prev];arr.forEach(f=>{const ext=extOf(f.name);if(!OKEXT.includes(ext)){bad.push(f.name);return;}const ver="v"+(nx.filter(x=>x.name===f.name).length+1);nx.push({name:f.name,type:ext.toUpperCase(),by:"Sarah Jenkins",date:"Today",version:ver});});return nx;});if(bad.length)show(`Unsupported: ${bad.join(", ")}`,"err");};
  const totalPct=pickedIds.reduce((s,id)=>s+picked[id].pct,0);

          :<button className="primary" style={btnPrimary} onClick={()=>{onCreate(d,picked,files);}}>Create project</button>}</div></>}>
    {step===1&&<div>
      <Field label="Project name"><input style={inputStyle} value={d.name} onChange={e=>setD({...d,name:e.target.value})} placeholder="e.g. Helios Mobile App"/></Field>
      <Field label="Client *"><ClientField key={d.clientId||"none"} clients={clients} value={d.clientId?clients.find(c=>c.id===d.clientId):null} onPick={c=>setD({...d,clientId:c?c.id:"",client:c?c.name:""})} onCreateNew={nm=>setNewClient(nm||"")}/></Field>

          <tbody>{pickedIds.map(id=><tr key={id}><td style={{...td,color:C.ink}}>{nameOf(id)}</td><td className="num" style={{...td,textAlign:"right"}}>{picked[id].pct}%</td><td className="num" style={{...td,textAlign:"right"}}>{picked[id].hours}h{picked[id].billing==="Billable"?` · ${picked[id].billable}h bill`:""}</td><td style={td}><Tag s={picked[id].billing==="Billable"?"Active":"Completed"}/> <span style={{fontSize:12,color:C.ink2}}>{picked[id].billing}</span></td></tr>)}</tbody></table>
        <div style={{marginTop:14,display:"flex",gap:10}}>{[["Total planned capacity",`${totalPct}%`],["Total weekly hours",`${totalHours}h`],["Resources assigned",pickedIds.length]].map(([k,v])=>

    </div>}
  </Drawer>
  {newClient!=null&&<CreateClient initialName={newClient} onClose={()=>setNewClient(null)} onSave={c=>{onAddClient(c);setD(prev=>({...prev,clientId:c.id,client:c.name}));setNewClient(null);show("Client created");}}/>}
  </>;
}
function EditProject({proj,pool,nameOf,onClose,onSave,onRemoveResource,onUpdateResource,onAddResource,show}){

      <div style={{flex:1}}><Field label="Priority"><select style={inputStyle} value={d.priority} onChange={e=>setD({...d,priority:e.target.value})}>{["High","Medium","Low"].map(x=><option key={x}>{x}</option>)}</select></Field></div></div>
    <div style={{display:"flex",gap:12}}><div style={{flex:1}}><Field label="Start date"><input style={inputStyle} value={d.start} onChange={e=>setD({...d,start:e.target.value})}/></Field></div>
      <div style={{flex:1}}><Field label="Expected end"><input style={inputStyle} value={d.end} onChange={e=>setD({...d,end:e.target.value})}/></Field></div></div>
    <div style={{display:"flex",gap:12}}><div style={{flex:1}}><Field label="Estimated hours"><input className="num" style={inputStyle} type="number" value={d.estimated} onChange={e=>setD({...d,estimated:e.target.value})}/></Field></div>
      <div style={{flex:1}}><Field label="Status"><select style={inputStyle} value={d.status} onChange={e=>setD({...d,status:e.target.value})}>{["Active","Planning","On-Hold","Delayed","Completed"].map(x=><option key={x}>{x}</option>)}</select></Field></div></div>
    <Field label="Description"><textarea style={{...inputStyle,minHeight:64,resize:"vertical"}} value={d.desc} onChange={e=>setD({...d,desc:e.target.value})}/></Field>

    <div style={{fontSize:11,color:C.ink3,textTransform:"uppercase",letterSpacing:".05em",margin:"6px 0 10px"}}>Attachments ({(proj.files||[]).length})</div>

      <div style={{border:`1px solid ${C.line}`,borderRadius:8,overflow:"hidden",marginBottom:6}}>{proj.files.map((f,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderBottom:i<proj.files.length-1?`1px solid ${C.line}`:"none"}}>
        <span style={{fontSize:9.5,fontWeight:700,color:C.ink2,border:`1px solid ${C.line}`,borderRadius:4,padding:"2px 5px",minWidth:38,textAlign:"center"}}>{f.type}</span>
        <div style={{flex:1,minWidth:0}}><div style={{fontSize:12.5,color:C.ink}}>{f.name}</div><div style={{fontSize:11,color:C.ink3}}>{f.by} · {f.date} · {f.version}</div></div>
        <button title="Download" className="ghost" onClick={()=>show("Download starting…")} style={{border:`1px solid ${C.line}`,background:C.surface,borderRadius:6,padding:"5px 9px",cursor:"pointer",fontSize:11.5,color:C.ink2}}>Download</button></div>)}</div>}

    <div style={{fontSize:11,color:C.ink3,textTransform:"uppercase",letterSpacing:".05em",margin:"6px 0 10px"}}>Resources ({proj.resources.length})</div>

        <div style={{display:"flex",gap:10}}>

          <div style={{flex:1}}><div style={{fontSize:10.5,color:C.ink3,marginBottom:3}}>Planned h</div><input className="num" type="number" min="0" value={r.planned} onChange={e=>onUpdateResource(proj.id,r.id,{planned:+e.target.value||0})} style={{...inputStyle,padding:"6px 8px"}}/></div>

      <button className="demo" style={btnGhost} disabled={!add} onClick={()=>{onAddResource(proj.id,add);setAdd("");}}><Icon n="plus" size={14} color={C.ink2}/> Add</button></div>
  </Drawer>;
}

/* ── 3. RESOURCE POOL ────────────────────────────────────────────── */
function ResourcePool({pool,onAllocate,show}){
  const [q,setQ]=useState("");const [dept,setDept]=useState("All departments");const [role,setRole]=useState("All roles");const [avail,setAvail]=useState("Any availability");
  const [alloc,setAlloc]=useState(null);
  const depts=["All departments",...Array.from(new Set(pool.map(p=>p.dept)))];
  const roles=["All roles",...Array.from(new Set(pool.map(p=>p.role)))];
  const list=pool.filter(r=>{const a=availPct(r);
    if(dept!=="All departments"&&r.dept!==dept)return false;
    if(role!=="All roles"&&r.role!==role)return false;
    if(avail==="≥ 50% free"&&a<50)return false; if(avail==="≥ 20% free"&&a<20)return false; if(avail==="Fully utilized"&&a>0)return false; if(avail==="Overallocated"&&util(r)<=100)return false;
    return (r.name+r.role+r.skills.join()).toLowerCase().includes(q.toLowerCase());});
  return <>
    <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16,alignItems:"center"}}>
      <SearchBox value={q} onChange={setQ} ph="Skill, name, role"/>
      <Select value={dept} onChange={setDept} opts={depts}/><Select value={role} onChange={setRole} opts={roles}/>
      <Select value={avail} onChange={setAvail} opts={["Any availability","≥ 50% free","≥ 20% free","Fully utilized","Overallocated"]}/>
      <span style={{fontSize:12,color:C.ink3,marginLeft:"auto"}}>{list.length} of {pool.length}</span></div>
    {list.length===0?<Empty msg="No available resources matching current filters."/>:
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
        {list.map(r=><ResourceCapacity key={r.id} r={r} action={<button className="demo" style={btnGhost} onClick={()=>setAlloc(r)}><Icon n="plus" size={13} color={C.ink2}/> Add to project</button>}/>)}</div>}
    {alloc&&<AllocModal r={alloc} onClose={()=>setAlloc(null)} onSave={(proj,pct,hours,billable)=>{onAllocate(alloc.id,proj,pct,hours,billable);setAlloc(null);show(`${alloc.name.split(" ")[0]} allocated · ${pct}% · ${hours}h`);}}/>}
  </>;
}
function AllocModal({r,onClose,onSave,fixedProj}){
  const [proj,setProj]=useState(fixedProj||"ipo");const [pct,setPct]=useState(25);
  const [hours,setHours]=useState(10);const [billable,setBillable]=useState(10);
  const u=util(r);const newU=u+pct;const over=newU>100;const billOver=billable>hours;
  return <Modal title={`Allocate ${r.name}`} onClose={onClose}
    footer={<><button className="demo" style={btnGhost} onClick={onClose}>Cancel</button>
      <button className="primary" style={{...btnPrimary,opacity:over?.5:1}} disabled={over} onClick={()=>onSave(proj,pct,+hours||0,+billable||0)}>Save allocation</button></>}>
    <div style={{border:`1px solid ${C.line}`,borderRadius:8,padding:"10px 12px",marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:6}}><span style={{color:C.ink2}}>Current utilization</span><span className="num" style={{color:C.ink}}>{u}% · {availPct(r)}% free</span></div><CapBar u={u}/></div>
    {!fixedProj&&<Field label="Project"><select style={inputStyle} value={proj} onChange={e=>setProj(e.target.value)}>{Object.entries(PROJ_META).map(([id,n])=><option key={id} value={id}>{n}</option>)}</select></Field>}
    <Field label="Capacity allocation" hint="Share of the resource's total capacity — independent of the hours below.">
      <div style={{display:"flex",gap:6}}>{[25,50,75,100].map(v=><button key={v} onClick={()=>setPct(v)} style={{flex:1,border:`1px solid ${pct===v?C.ink:C.line}`,background:pct===v?C.ink:C.surface,color:pct===v?"#fff":C.ink2,borderRadius:6,padding:"8px 0",fontSize:13,cursor:"pointer",fontWeight:500}}>{v}%</button>)}</div></Field>
    <div style={{display:"flex",gap:12}}>
      <div style={{flex:1}}><Field label="Planned weekly hours"><input className="num" style={inputStyle} type="number" min="0" max="60" value={hours} onChange={e=>setHours(e.target.value)}/></Field></div>
      <div style={{flex:1}}><Field label="Billable hours"><input className="num" style={{...inputStyle,borderColor:billOver?C.warn:C.lineStrong}} type="number" min="0" value={billable} onChange={e=>setBillable(e.target.value)}/></Field></div></div>
    {billOver&&<div style={{fontSize:11.5,color:C.warn,marginTop:-4,marginBottom:10,display:"flex",alignItems:"center",gap:6}}><Icon n="alert" size={13} color={C.warn}/> Billable hours exceed planned hours.</div>}
    {over&&<Notice tone="warn" icon="alert" title={`Exceeds capacity (${newU}%)`} body="Reduce the capacity % or free up other commitments first."/>}
  </Modal>;
}

/* ── 4. APPROVALS ────────────────────────────────────────────────── */
function Approvals({queue,setQueue,show}){
  const [tab,setTab]=useState("Pending");const [open,setOpen]=useState(null);const [sel,setSel]=useState({});const [reject,setReject]=useState(null);const [reason,setReason]=useState("");
  const list=queue.filter(q=>q.status===tab);
  const counts={Pending:queue.filter(q=>q.status==="Pending").length,Approved:queue.filter(q=>q.status==="Approved").length,Rejected:queue.filter(q=>q.status==="Rejected").length};
  const selIds=Object.keys(sel).filter(k=>sel[k]);
  const approve=ids=>{setQueue(queue.map(q=>ids.includes(q.id)?{...q,status:"Approved"}:q));setSel({});show(`${ids.length} approved`);};
  return <>
    <div style={{display:"flex",gap:4,marginBottom:14,borderBottom:`1px solid ${C.line}`}}>
      {["Pending","Approved","Rejected"].map(t=><button key={t} className="tab" onClick={()=>{setTab(t);setOpen(null);setSel({});}}
        style={{border:"none",background:"none",cursor:"pointer",padding:"8px 12px",fontSize:13,fontWeight:tab===t?600:500,color:tab===t?C.ink:C.ink3,borderBottom:`2px solid ${tab===t?C.ink:"transparent"}`,marginBottom:-1}}>{t} <span className="num" style={{color:C.ink3}}>· {counts[t]}</span></button>)}</div>

    {tab==="Pending"&&selIds.length>0&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",border:`1px solid ${C.line}`,borderRadius:8,marginBottom:12,background:C.accentSoft}}>
      <span style={{fontSize:12.5,color:C.ink}}>{selIds.length} selected</span>
      <div style={{display:"flex",gap:8}}><button className="demo" style={btnGhost} onClick={()=>{setQueue(queue.map(q=>selIds.includes(q.id)?{...q,status:"Rejected",comment:"Bulk: please review."}:q));setSel({});show("Sent back");}}>Reject all</button>
        <button className="primary" style={{...btnPrimary,padding:"7px 12px"}} onClick={()=>approve(selIds)}><Icon n="check" size={13} color="#fff"/> Approve all</button></div></div>}

    {list.length===0?<Empty msg={tab==="Pending"?"All timesheets have been reviewed.":`No ${tab.toLowerCase()} timesheets.`}/>:
    <Panel pad={false}><table style={{width:"100%",borderCollapse:"collapse"}}>
      <thead><tr>{tab==="Pending"&&<th style={{...th,width:34}}></th>}<th style={th}>Employee</th><th style={th}>Project</th><th style={{...th,textAlign:"right"}}>Allocated</th><th style={{...th,textAlign:"right"}}>Logged</th><th style={{...th,textAlign:"right"}}>Variance</th><th style={th}>Submitted</th><th style={{...th,textAlign:"right"}}></th></tr></thead>
      <tbody>{list.map(q=>{const v=q.logged-q.alloc;const exp=open===q.id;return <React.Fragment key={q.id}>
        <tr className="row">
          {tab==="Pending"&&<td style={td}><input type="checkbox" checked={!!sel[q.id]} onChange={e=>setSel({...sel,[q.id]:e.target.checked})} style={{accentColor:C.ink}}/></td>}
          <td style={{...td,color:C.ink,fontWeight:500}}>{q.emp}</td><td style={td}>{PROJ_META[q.proj]}</td>
          <td className="num" style={{...td,textAlign:"right"}}>{q.alloc}h</td><td className="num" style={{...td,textAlign:"right",color:C.ink}}>{q.logged}h</td>
          <td className="num" style={{...td,textAlign:"right",color:v>0?C.warn:v<0?C.ink3:C.ok}}>{v>0?"+":""}{v}h</td>
          <td style={td}>{q.date}</td>
          <td style={{...td,textAlign:"right"}}><button className="lnk" onClick={()=>setOpen(exp?null:q.id)} style={{border:"none",background:"none",color:C.ink2,fontSize:12.5,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:4}}>Review <Icon n={exp?"down":"right"} size={13} color={C.ink3}/></button></td></tr>
        {exp&&<tr><td colSpan={tab==="Pending"?8:7} style={{padding:0,borderBottom:`1px solid ${C.line}`,background:"#FBFBF9"}}>
          <div style={{padding:"14px 16px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{fontSize:11,color:C.ink3,textTransform:"uppercase",letterSpacing:".05em"}}>Daily entries · {PROJ_META[q.proj]}</div>
              <div className="num" style={{fontSize:12,color:C.ink2}}>Week total <b style={{color:C.ink}}>{q.daily.reduce((a,b)=>a+(b.h||0),0)}h</b></div></div>
            <div style={{border:`1px solid ${C.line}`,borderRadius:8,overflow:"hidden",marginBottom:q.status==="Rejected"?12:14}}>
              {["Mon","Tue","Wed","Thu","Fri"].map((d,i)=>{const e=q.daily[i]||{h:0,d:""};return <div key={d} style={{display:"flex",gap:14,padding:"10px 14px",borderBottom:i<4?`1px solid ${C.line}`:"none",background:C.surface,alignItems:"flex-start"}}>
                <div style={{width:54,flexShrink:0}}><div style={{fontSize:11,color:C.ink3}}>{d}</div><div className="num" style={{fontSize:14,fontWeight:600,color:e.h?C.ink:C.ink3,marginTop:1}}>{e.h?`${e.h}h`:"—"}</div></div>
                <div style={{fontSize:12.5,color:e.d?C.ink2:C.ink3,lineHeight:1.5,paddingTop:1}}>{e.d||"No work logged."}</div></div>;})}</div>
            {q.status==="Rejected"&&q.comment&&<div style={{marginBottom:12}}><Notice tone="err" title="Your comment" body={q.comment}/></div>}
            {tab==="Pending"&&<div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
              <button className="demo" style={btnGhost} onClick={()=>{setReject(q);setReason("");}}>Reject</button>
              <button className="primary" style={{...btnPrimary,padding:"7px 14px"}} onClick={()=>approve([q.id])}><Icon n="check" size={13} color="#fff"/> Approve</button></div>}
          </div></td></tr>}
      </React.Fragment>;})}</tbody></table></Panel>}

    {reject&&<Modal title={`Reject — ${reject.emp}`} onClose={()=>setReject(null)}
      footer={<><button className="demo" style={btnGhost} onClick={()=>setReject(null)}>Cancel</button>
        <button className="primary" style={{...btnPrimary,background:C.err,opacity:reason.trim()?1:.5}} disabled={!reason.trim()} onClick={()=>{setQueue(queue.map(x=>x.id===reject.id?{...x,status:"Rejected",comment:reason}:x));setReject(null);show("Sent back with comment");}}>Reject & notify</button></>}>
      <Field label="Comment (required)" hint="The employee can edit and resubmit after reading this."><textarea style={{...inputStyle,minHeight:84,resize:"vertical"}} value={reason} onChange={e=>setReason(e.target.value)} placeholder="e.g. Please explain the extra 5 hours logged on Wednesday."/></Field>
    </Modal>}
  </>;
}

function EntryEditor({label,day,entry,onChange,onDone,onClose,lastDay}){
  const [tried,setTried]=useState(false);
  const len=entry.d.trim().length;
  let err="";
  if(tried){ if(!(entry.h>0)) err="Enter the hours worked for this day."; else if(len===0) err="Please describe the work completed before saving your hours."; else if(len<MIN_DESC) err=`Add a little more detail — at least ${MIN_DESC} characters.`; }
  const done=()=>{ if(!(entry.h>0)||!validDesc(entry.d)){setTried(true);return;} onDone(); };
  return <div style={{border:`1px solid ${C.accent}`,borderRadius:8,background:C.accentSoft,padding:14}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <span style={{fontSize:12.5,fontWeight:600,color:C.ink}}>{DAY_FULL[day]} work details · {label}</span>
      <button onClick={onClose} style={{border:"none",background:"none",cursor:"pointer",padding:2,display:"flex"}}><Icon n="x" size={15} color={C.ink2}/></button></div>
    <div style={{display:"flex",gap:12,alignItems:"flex-start",flexWrap:"wrap"}}>
      <div style={{width:80}}><div style={{fontSize:11,color:C.ink2,marginBottom:5}}>Hours</div>
        <input className="num" type="number" min="0" max="24" value={entry.h||""} placeholder="0" autoFocus onChange={e=>{let n=parseFloat(e.target.value);n=isNaN(n)||n<0?0:Math.min(24,n);onChange({...entry,h:n});}}
          style={{width:"100%",border:`1px solid ${C.lineStrong}`,borderRadius:6,padding:"8px 10px",fontSize:14,color:C.ink,textAlign:"center",background:C.surface}}/></div>
      <div style={{flex:1,minWidth:220}}><div style={{fontSize:11,color:C.ink2,marginBottom:5}}>Work description <span style={{color:C.err}}>*</span></div>
        <textarea value={entry.d} onChange={e=>onChange({...entry,d:e.target.value})} placeholder="Describe the work completed during these hours..."
          style={{width:"100%",minHeight:64,resize:"vertical",border:`1px solid ${err?C.err:C.lineStrong}`,borderRadius:6,padding:"9px 11px",fontSize:13.5,color:C.ink,background:C.surface,lineHeight:1.5}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6,gap:10}}>
          <span style={{fontSize:11.5,color:err?C.err:len>=MIN_DESC?C.ok:C.ink3,display:"flex",alignItems:"center",gap:5}}>{err?<Icon n="alert" size={12} color={C.err}/>:len>=MIN_DESC&&entry.h>0?<Icon n="check" size={12} color={C.ok}/>:null}{err||`${len} / ${MIN_DESC} characters minimum`}</span>
          <button className="primary" style={{...btnPrimary,padding:"7px 14px",whiteSpace:"nowrap"}} onClick={done}>{lastDay?"Done":"Done & next day"} {!lastDay&&<Icon n="arrow" size={13} color="#fff"/>}</button></div>
      </div></div>
  </div>;
}

function MyTimesheet({entries,setEntries,status,setStatus,show}){
  const locked=status==="Submitted"||status==="Approved";
  const [sel,setSel]=useState(null);
  const [saved,setSaved]=useState(true);
  useEffect(()=>{ if(locked)return; setSaved(false); const t=setTimeout(()=>setSaved(true),900); return ()=>clearTimeout(t); },[entries,locked]);
  const dayTotals=DAYS.map((_,d)=>PM_ROWS.reduce((s,r)=>s+(entries[r.id][d].h||0),0));
  const weekTotal=dayTotals.reduce((a,b)=>a+b,0);const overDay=dayTotals.some(t=>t>LIMIT);
  const incomplete=PM_ROWS.flatMap(r=>entries[r.id].map((e,d)=>needsDesc(e)?{row:r.id,day:d}:null)).filter(Boolean);
  const labelOf=rid=>PM_ROWS.find(r=>r.id===rid).name;
  const setEntry=(rid,day,val)=>{ if(locked)return; setEntries(prev=>({...prev,[rid]:prev[rid].map((e,i)=>i===day?val:e)})); };
  const open=(rid,day)=>{ if(!locked) setSel({row:rid,day}); };
  const doneNext=(rid,day)=>{ show("Saved"); if(day<6) setSel({row:rid,day:day+1}); else setSel(null); };
  const submit=()=>{ if(weekTotal===0){show("Log some hours first","err");return;} if(incomplete.length>0){setSel({row:incomplete[0].row,day:incomplete[0].day});show("Add a description to every logged day first","err");return;} setStatus("Submitted");show("Week submitted");setSel(null); };
  return <div style={{display:"flex",flexDirection:"column",gap:14}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:10}}>
      <div><div style={{fontSize:12.5,fontWeight:600,color:C.ink,textTransform:"uppercase",letterSpacing:".05em"}}>My timesheet</div>
        <div style={{fontSize:12,color:C.ink3,marginTop:3}}>You're a resource too — every logged hour needs a work description.</div></div>
      <div style={{textAlign:"right"}}><div className="num" style={{fontSize:13,color:C.ink2}}><span style={{color:C.ink,fontWeight:600,fontSize:16}}>{weekTotal}h</span> logged</div>
        {!locked&&<div style={{fontSize:11.5,color:saved?C.ok:C.ink3,marginTop:3,display:"flex",alignItems:"center",gap:5,justifyContent:"flex-end"}}>{saved?<><Icon n="check" size={12} color={C.ok}/> Draft saved</>:"Saving…"}</div>}</div></div>
    {status==="Submitted"&&<Notice tone="accent" icon="lock" title="Submitted · pending approval" body="Locked until reviewed."/>}
    {status==="Approved"&&<Notice tone="ok" icon="check" title="Approved"/>}
    {status==="Rejected"&&<Notice tone="err" icon="alert" title="Changes requested" body="Review and resubmit."/>}
    <section style={{border:`1px solid ${C.line}`,borderRadius:8,background:C.surface,overflow:"hidden"}}>
      <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",minWidth:620}}>
        <thead><tr><th style={{...th,width:"32%"}}>Activity</th>{DAYS.map((d,i)=><th key={d} style={{...th,textAlign:"center",color:i===TODAY?C.accent:C.ink3,opacity:i>4?.8:1}}>{d}</th>)}<th style={{...th,textAlign:"center",color:C.ink}}>Total</th></tr></thead>
        <tbody>{PM_ROWS.map(r=>{const rt=entries[r.id].reduce((s,e)=>s+e.h,0);const main=
          <tr key={r.id} className="row"><td style={{...td,color:C.ink,fontWeight:500}}>{r.name}</td>
            {DAYS.map((_,d)=>{const e=entries[r.id][d];const need=needsDesc(e);const se=sel&&sel.row===r.id&&sel.day===d;
              return <td key={d} onClick={()=>open(r.id,d)} style={{padding:0,borderBottom:`1px solid ${C.line}`,cursor:locked?"default":"pointer",background:se?C.accentSoft:d===TODAY?"rgba(56,97,140,.035)":"transparent",boxShadow:need?`inset 0 -2px 0 ${C.warn}`:undefined}}>
                <input className="hcell num" value={e.h||""} placeholder="·" disabled={locked} onFocus={()=>open(r.id,d)} onChange={ev=>{let n=parseFloat(ev.target.value);n=isNaN(n)||n<0?0:Math.min(24,n);setEntry(r.id,d,{...e,h:n});open(r.id,d);}}
                  style={{width:"100%",border:"none",background:"transparent",textAlign:"center",padding:"13px 0",fontSize:13.5,color:e.h?(need?C.warn:C.ink):C.ink3,cursor:locked?"not-allowed":"pointer"}}/></td>;})}
            <td className="num" style={{...td,textAlign:"center",fontWeight:600,color:C.ink}}>{rt||"—"}</td></tr>;
          const out=[main];
          if(sel&&sel.row===r.id) out.push(<tr key={r.id+"-ed"}><td colSpan={9} style={{padding:"10px 12px",borderBottom:`1px solid ${C.line}`,background:"#FBFBF9"}}>
            <EntryEditor label={labelOf(r.id)} day={sel.day} entry={entries[r.id][sel.day]} onChange={v=>setEntry(r.id,sel.day,v)} onDone={()=>doneNext(r.id,sel.day)} onClose={()=>setSel(null)} lastDay={sel.day===6}/></td></tr>);
          return out;})}
          <tr style={{borderTop:`1px solid ${C.lineStrong}`}}><td style={{...td,fontSize:12,fontWeight:600,color:C.ink2}}>Daily total</td>
            {dayTotals.map((t,i)=><td key={i} className="num" style={{...td,textAlign:"center",fontWeight:600,color:t>LIMIT?C.warn:t?C.ink:C.ink3}}>{t||"—"}</td>)}
            <td className="num" style={{...td,textAlign:"center",fontWeight:700,color:C.ink}}>{weekTotal}</td></tr></tbody></table></div>
      {overDay&&!locked&&<div style={{padding:"9px 16px",borderTop:`1px solid ${C.line}`,fontSize:12,color:C.warn,display:"flex",alignItems:"center",gap:8,background:C.warnSoft}}><Icon n="alert" size={14} color={C.warn}/> A day exceeds {LIMIT}h.</div>}
    </section>
    {incomplete.length>0&&!locked&&<div style={{fontSize:12,color:C.warn,display:"flex",alignItems:"center",gap:8}}><Dot c={C.warn}/> {incomplete.length} logged {incomplete.length===1?"day needs":"days need"} a work description before you can submit.</div>}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderTop:`1px solid ${C.line}`,paddingTop:14}}>
      <Tag s={status} strong/>
      <button className="primary" style={{...btnPrimary,opacity:locked&&status!=="Rejected"?.4:1,pointerEvents:locked&&status!=="Rejected"?"none":"auto"}} onClick={submit}>{status==="Rejected"?"Resubmit":"Submit week"}</button></div>
  </div>;
}

function clientStats(c,projects){const ps=projects.filter(p=>p.client===c.name);
  return {projects:ps,total:ps.length,active:ps.filter(p=>p.status==="Active").length,pms:Array.from(new Set(ps.map(p=>p.pm).filter(Boolean)))};}
function ClientDirectory({clients,projects,onOpen}){
  const [q,setQ]=useState("");const [ind,setInd]=useState("All industries");const [country,setCountry]=useState("All countries");const [filt,setFilt]=useState("All clients");
  const inds=["All industries",...Array.from(new Set(clients.map(c=>c.industry)))];
  const countries=["All countries",...Array.from(new Set(clients.map(c=>c.country)))];
  const list=clients.filter(c=>{const st=clientStats(c,projects);
    if(ind!=="All industries"&&c.industry!==ind)return false;
    if(country!=="All countries"&&c.country!==country)return false;
    if(filt==="Active clients"&&c.status!=="Active")return false;
    if(filt==="Inactive clients"&&c.status!=="Inactive")return false;
    if(filt==="With active projects"&&st.active===0)return false;
    if(filt==="Without projects"&&st.total>0)return false;
    return (c.name+c.contact+c.industry+c.country).toLowerCase().includes(q.toLowerCase());});
  return <Panel pad={false} title="Client directory" sub="Every project belongs to a client"
    right={<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
      <SearchBox value={q} onChange={setQ} ph="Client, contact, industry"/>
      <Select value={ind} onChange={setInd} opts={inds}/><Select value={country} onChange={setCountry} opts={countries}/>
      <Select value={filt} onChange={setFilt} opts={["All clients","Active clients","Inactive clients","With active projects","Without projects"]}/></div>}>
    {list.length===0?<Empty msg="No clients match the current filters."/>:
    <table style={{width:"100%",borderCollapse:"collapse"}}>
      <thead><tr><th style={th}>Client</th><th style={th}>Industry</th><th style={th}>Primary contact</th><th style={th}>Country</th><th style={{...th,textAlign:"right"}}>Projects</th><th style={{...th,textAlign:"right"}}>Active</th><th style={th}>PMs</th><th style={{...th,textAlign:"right"}}></th></tr></thead>
      <tbody>{list.map(c=>{const s=clientStats(c,projects);return <tr key={c.id} className="row" style={{opacity:c.status==="Inactive"?.6:1}}>
        <td style={{...td,color:C.ink,fontWeight:500}}>{c.name}{c.status==="Inactive"&&<span style={{marginLeft:8}}><Tag s="Completed"/></span>}</td>
        <td style={td}>{c.industry}</td><td style={td}>{c.contact}</td><td style={td}>{c.country}</td>
        <td className="num" style={{...td,textAlign:"right"}}>{s.total}</td>
        <td className="num" style={{...td,textAlign:"right",color:s.active?C.ok:C.ink3}}>{s.active}</td>
        <td style={{...td,fontSize:12}}>{s.pms.length?s.pms.join(", "):"—"}</td>
        <td style={{...td,textAlign:"right"}}><button className="lnk" onClick={()=>onOpen(c)} style={{border:"none",background:"none",color:C.ink2,fontSize:12.5,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:5}}>View <Icon n="right" size={13} color={C.ink3}/></button></td></tr>;})}</tbody></table>}
  </Panel>;
}

        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:22}}>
          {[["Resources",resIds.length],["Allocated",`${allocated}h`],["Logged",`${logged}h`]].map(([k,v])=><div key={k} style={{border:`1px solid ${C.line}`,borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:10.5,color:C.ink3,textTransform:"uppercase",letterSpacing:".04em"}}>{k}</div><div className="num" style={{fontSize:16,color:C.ink,marginTop:3}}>{v}</div></div>)}</div>

        <div style={{fontSize:11,color:C.ink3,textTransform:"uppercase",letterSpacing:".05em",marginBottom:8}}>Activity timeline</div>
        <div style={{display:"flex",flexDirection:"column",gap:0}}>{timeline.map((e,i)=><div key={i} style={{display:"flex",gap:10,padding:"8px 0",borderBottom:i<timeline.length-1?`1px solid ${C.line}`:"none"}}>
          <span style={{marginTop:5}}><Dot c={C.accent}/></span><div style={{fontSize:12.5,color:C.ink}}>{e.t}<span style={{color:C.ink3}} className="num"> · {e.d}</span></div></div>)}</div>
      </div>
      <div style={{padding:"12px 22px",borderTop:`1px solid ${C.line}`,fontSize:11.5,color:C.ink3}}>Financial summary is available to Admin & COO.</div>
    </aside></>;
}

/* ── dashboard shell ─────────────────────────────────────────────── */
const TABS=[["My Projects","folder"],["Resource Pool","users"],["Approvals","inbox"],["Clients","building"],["My Timesheet","clock"]];
function Dashboard({onLogout,toast,show}){
  const [tab,setTab]=useState("My Projects");
  const [pool,setPool]=useState(POOL0);const [projects,setProjects]=useState(PROJECTS0);const [queue,setQueue]=useState(APPROVALS0);
  const [clients,setClients]=useState(CLIENTS0);const [clientOpen,setClientOpen]=useState(null);
  const [skills,setSkills]=useState(["Delivery Management","Capacity Planning","Stakeholder Comms","Agile"]);
  const [pmEntries,setPmEntries]=useState(seedPmEntries);
  const [pmStatus,setPmStatus]=useState("Draft");
  const [profileOpen,setProfileOpen]=useState(false);const [createOpen,setCreateOpen]=useState(false);const [notifOpen,setNotifOpen]=useState(false);
  const [editId,setEditId]=useState(null);const [deleteTarget,setDeleteTarget]=useState(null);
  const [weekIdx,setWeekIdx]=useState(0);
  const nameOf=id=>(pool.find(p=>p.id===id)||{name:id}).name;
  const week=`${24+weekIdx*7} – ${30+weekIdx*7} June 2026`;
  const pending=queue.filter(q=>q.status==="Pending").length;
  const orgUtil=Math.round(pool.reduce((s,r)=>s+util(r),0)/pool.length);
  const over=pool.filter(r=>util(r)>100).length;const free=pool.filter(r=>util(r)<100).length;

  const allocate=(id,proj,pct,hours,billable)=>{
    setPool(prev=>prev.map(r=>r.id===id?{...r,allocs:[...r.allocs.filter(a=>a.proj!==proj),{proj,pct}]}:r));
    setProjects(prev=>prev.map(p=>p.id===proj?{...p,resources:[...p.resources.filter(x=>x.id!==id),{id,pct,planned:+hours||0,billable:+billable||0,actual:(p.resources.find(x=>x.id===id)||{}).actual||0}]}:p));
  };
  const create=(d,picked,files)=>{const id="p"+Date.now();
    const resArr=Object.keys(picked).map(rid=>({id:rid,pct:picked[rid].pct,planned:+picked[rid].hours||0,billable:+picked[rid].billable||0,billing:picked[rid].billing||"Billable",actual:0}));
    setProjects(prev=>[{id,name:d.name,client:d.client||"—",clientId:d.clientId,type:d.type,status:d.status,start:d.start||"—",end:d.end||"—",priority:d.priority,desc:d.desc,estimated:+d.estimated,logged:0,pending:0,files:files||[],resources:resArr},...prev]);
    setPool(prev=>prev.map(r=>picked[r.id]?{...r,allocs:[...r.allocs.filter(a=>a.proj!==id),{proj:id,pct:picked[r.id].pct}]}:r));
    setCreateOpen(false);show("Project created");};
  const addClient=c=>setClients(prev=>[c,...prev]);
  const updateProject=(pid,patch)=>{ setProjects(prev=>prev.map(p=>p.id===pid?{...p,...patch}:p)); setEditId(null); show("Project updated"); };
  const deleteProject=p=>{ setProjects(prev=>prev.filter(x=>x.id!==p.id)); setPool(prev=>prev.map(r=>({...r,allocs:r.allocs.filter(a=>a.proj!==p.id)}))); setDeleteTarget(null); show("Project deleted"); };
  const removeResource=(pid,rid)=>{ setProjects(prev=>prev.map(p=>p.id===pid?{...p,resources:p.resources.filter(x=>x.id!==rid)}:p)); setPool(prev=>prev.map(r=>r.id===rid?{...r,allocs:r.allocs.filter(a=>a.proj!==pid)}:r)); show("Resource removed"); };
  const updateResource=(pid,rid,patch)=>{ setProjects(prev=>prev.map(p=>p.id===pid?{...p,resources:p.resources.map(x=>x.id===rid?{...x,...patch}:x)}:p)); if(patch.pct!=null) setPool(prev=>prev.map(r=>r.id===rid?{...r,allocs:r.allocs.map(a=>a.proj===pid?{...a,pct:patch.pct}:a)}:r)); };
  const addResource=(pid,rid)=>{ setProjects(prev=>prev.map(p=>p.id===pid?(p.resources.some(x=>x.id===rid)?p:{...p,resources:[...p.resources,{id:rid,pct:25,planned:10,billable:10,actual:0}]}):p)); setPool(prev=>prev.map(r=>r.id===rid?{...r,allocs:[...r.allocs.filter(a=>a.proj!==pid),{proj:pid,pct:25}]}:r)); show("Resource added"); };
  const editProj=projects.find(p=>p.id===editId)||null;

  return <div className="pulse-root" style={{minHeight:"100vh",background:C.paper}}>
    {/* header */}
    <header style={{background:C.surface,borderBottom:`1px solid ${C.line}`,padding:"0 28px",height:58,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:30}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:28,height:28,borderRadius:7,background:C.ink,display:"flex",alignItems:"center",justifyContent:"center"}}><Icon n="clock" size={15} color="#fff"/></div>
        <div style={{display:"flex",alignItems:"baseline",gap:8}}><span style={{fontSize:16,fontWeight:700,color:C.ink,letterSpacing:"-0.02em"}}>Pulse</span><span style={{fontSize:12.5,color:C.ink3}}>PM</span></div></div>
      <div style={{display:"flex",alignItems:"center",gap:18}}>
        <div style={{display:"flex",alignItems:"center",gap:2,color:C.ink2}}>
          <button className="ghost" onClick={()=>setWeekIdx(w=>w-1)} style={navBtn}><Icon n="left" size={16} color={C.ink2}/></button>
          <span className="num" style={{minWidth:138,textAlign:"center",fontSize:13,color:C.ink}}>{week}</span>
          <button className="ghost" onClick={()=>setWeekIdx(w=>w+1)} style={navBtn}><Icon n="right" size={16} color={C.ink2}/></button></div>
        <div style={{position:"relative"}}>
          <button className="ghost" onClick={()=>setNotifOpen(o=>!o)} style={{...navBtn,position:"relative"}}><Icon n="bell" size={17} color={C.ink2}/>
            {pending>0&&<span style={{position:"absolute",top:3,right:3,width:7,height:7,borderRadius:99,background:C.accent,border:`1.5px solid ${C.surface}`}}/>}</button>
          {notifOpen&&<><div onClick={()=>setNotifOpen(false)} style={{position:"fixed",inset:0,zIndex:40}}/>
            <div style={{position:"absolute",right:0,top:38,width:320,background:C.surface,border:`1px solid ${C.line}`,borderRadius:10,boxShadow:"0 8px 30px rgba(0,0,0,.12)",zIndex:50,overflow:"hidden"}}>
              <div style={{padding:"11px 14px",borderBottom:`1px solid ${C.line}`,fontSize:12.5,fontWeight:600,color:C.ink}}>Notifications</div>
              {NOTIFS.map((n,i)=><div key={i} style={{padding:"11px 14px",borderBottom:i<NOTIFS.length-1?`1px solid ${C.line}`:"none",display:"flex",gap:10}}>
                <span style={{marginTop:5}}><Dot c={n.tone}/></span><div><div style={{fontSize:12.5,color:C.ink,lineHeight:1.4}}>{n.t}</div><div style={{fontSize:11,color:C.ink3,marginTop:2}}>{n.time}</div></div></div>)}</div></>}</div>
        <button onClick={()=>setProfileOpen(true)} style={{display:"flex",alignItems:"center",gap:8,border:`1px solid ${C.line}`,borderRadius:99,padding:"3px 3px 3px 11px",background:C.surface,cursor:"pointer"}}>
          <span style={{fontSize:12.5,fontWeight:500,color:C.ink}}>{PM.name.split(" ")[0]}</span>
          <span style={{width:28,height:28,borderRadius:99,background:C.ink,color:"#fff",fontSize:11,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center"}}>{PM.name.split(" ").map(n=>n[0]).join("")}</span></button>
      </div>
    </header>

    {/* tabs */}
    <div style={{background:C.surface,borderBottom:`1px solid ${C.line}`,padding:"0 28px",display:"flex",gap:4,position:"sticky",top:58,zIndex:25}}>
      {TABS.map(([label,icon])=>{const active=tab===label;const badge=label==="Approvals"&&pending>0?pending:null;
        return <button key={label} className="tab" onClick={()=>setTab(label)} style={{border:"none",background:"none",cursor:"pointer",padding:"13px 12px",fontSize:13,fontWeight:active?600:500,color:active?C.ink:C.ink3,borderBottom:`2px solid ${active?C.ink:"transparent"}`,marginBottom:-1,display:"flex",alignItems:"center",gap:7}}>
          <Icon n={icon} size={15} color={active?C.ink:C.ink3}/>{label}{badge&&<span className="num" style={{fontSize:11,color:"#fff",background:C.accent,borderRadius:99,padding:"1px 6px"}}>{badge}</span>}</button>;})}
    </div>

    <main style={{maxWidth:1120,margin:"0 auto",padding:"24px 28px"}}>
      {/* org capacity strip */}
      {(tab==="My Projects"||tab==="Resource Pool")&&<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:18}}>
        <KPI label="Org utilization" value={`${orgUtil}%`}/>
        <KPI label="Available" value={free} note="have free capacity" tone={C.ok}/>
        <KPI label="Overallocated" value={over} note={over?"needs rebalancing":"none"} tone={over?C.warn:C.ink3}/>
        <KPI label="Timesheets pending" value={pending} note="awaiting you" tone={pending?C.accent:C.ink3}/>
      </div>}
      {tab==="My Projects"&&<MyProjects projects={projects} nameOf={nameOf} onNew={()=>setCreateOpen(true)} onEdit={p=>setEditId(p.id)} onDelete={p=>setDeleteTarget(p)} onRemoveResource={removeResource}/>}
      {tab==="Resource Pool"&&<ResourcePool pool={pool} onAllocate={allocate} show={show}/>}
      {tab==="Approvals"&&<Approvals queue={queue} setQueue={setQueue} show={show}/>}
      {tab==="Clients"&&<ClientDirectory clients={clients} projects={projects} onOpen={setClientOpen}/>}
      {tab==="My Timesheet"&&<MyTimesheet entries={pmEntries} setEntries={setPmEntries} status={pmStatus} setStatus={setPmStatus} show={show}/>}
    </main>

    {createOpen&&<CreateProject pool={pool} nameOf={nameOf} clients={clients} onAddClient={addClient} onClose={()=>setCreateOpen(false)} onCreate={create} show={show}/>}
    {clientOpen&&<ClientDetail client={clientOpen} projects={projects} nameOf={nameOf} onClose={()=>setClientOpen(null)}/>}
    {editProj&&<EditProject proj={editProj} pool={pool} nameOf={nameOf} onClose={()=>setEditId(null)} onSave={updateProject} onRemoveResource={removeResource} onUpdateResource={updateResource} onAddResource={addResource} show={show}/>}
    {deleteTarget&&<Modal title="Delete project" onClose={()=>setDeleteTarget(null)}
      footer={<><button className="demo" style={btnGhost} onClick={()=>setDeleteTarget(null)}>Cancel</button>
        <button className="primary" style={{...btnPrimary,background:C.err}} onClick={()=>deleteProject(deleteTarget)}><Icon n="trash" size={13} color="#fff"/> Delete project</button></>}>
      <div style={{fontSize:13.5,color:C.ink,marginBottom:6}}>Delete <b>{deleteTarget.name}</b>?</div>
      <div style={{fontSize:12.5,color:C.ink2,lineHeight:1.5}}>This removes the project and frees the capacity its {deleteTarget.resources.length} {deleteTarget.resources.length===1?"resource":"resources"} had allocated to it. This can't be undone.</div>
    </Modal>}
    {profileOpen&&<Profile skills={skills} setSkills={setSkills} onClose={()=>setProfileOpen(false)} onLogout={onLogout} show={show}/>}
    {toast}
  </div>;
}
const navBtn={width:30,height:30,border:"none",background:"none",borderRadius:6,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"};

function App(){const [authed,setAuthed]=useState(false);const [toast,show]=useToast();
  if(!authed)return <><style>{sheet}</style><Login onLogin={()=>setAuthed(true)}/></>;
  return <><style>{sheet}</style><Dashboard onLogout={()=>setAuthed(false)} toast={toast} show={show}/></>;}
const s=document.createElement("style");s.textContent=sheet;document.head.appendChild(s);
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
