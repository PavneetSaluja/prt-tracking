const loadRolePermissions = () => {
  const saved = localStorage.getItem("pulse_role_perms");
  if (saved) {
    try { return JSON.parse(saved); } catch (e) {}
  }
  return DEFAULT_ROLE_PERMS;
};

const saveRolePermissions = (perms) => {
  localStorage.setItem("pulse_role_perms", JSON.stringify(perms));
};

const hasPermission = (role, permissionKey) => {
  if (role === "Admin") return true;
  const perms = loadRolePermissions();
  const roleKey = role.toLowerCase();
  if (perms[roleKey] && perms[roleKey][permissionKey] !== undefined) {
    return perms[roleKey][permissionKey];
  }
  if (DEFAULT_ROLE_PERMS[roleKey]) {
    return DEFAULT_ROLE_PERMS[roleKey][permissionKey];
  }
  return false;
};

/* ── charts (hand-built SVG) ─────────────────────────────────────── */
function Donut({data,size=148,thick=20}){
  const r=(size-thick)/2,cx=size/2,circ=2*Math.PI*r,total=data.reduce((s,d)=>s+d.value,0)||1;let acc=0;
  return <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
    <g transform={`rotate(-90 ${cx} ${cx})`}><circle cx={cx} cy={cx} r={r} fill="none" stroke={C.line} strokeWidth={thick}/>
      {data.map((d,i)=>{const len=d.value/total*circ,off=acc/total*circ;acc+=d.value;return <circle key={i} cx={cx} cy={cx} r={r} fill="none" stroke={d.color} strokeWidth={thick} strokeDasharray={`${len} ${circ-len}`} strokeDashoffset={-off}/>;})}</g>
    <text x={cx} y={cx-2} textAnchor="middle" fontSize="22" fontWeight="700" fill={C.ink} className="num">{total}</text>
    <text x={cx} y={cx+15} textAnchor="middle" fontSize="10" fill={C.ink3}>projects</text></svg>;
}
function Trend({data}){
  const W=560,H=210,pl=44,pr=14,pt=14,pb=26;
  const max=Math.max(...data.flatMap(d=>[d.rev,d.exp]))*1.18;
  const xs=i=>pl+(i/(data.length-1))*(W-pl-pr);
  const ys=v=>H-pb-(v/max)*(H-pt-pb);
  const path=k=>data.map((d,i)=>`${i?"L":"M"}${xs(i).toFixed(1)},${ys(k==="profit"?d.rev-d.exp:d[k]).toFixed(1)}`).join(" ");
  const grid=[0,.25,.5,.75,1].map(f=>Math.round(max*f));
  return <div><svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto"}}>
    {grid.map((g,i)=>{const y=ys(g);return <g key={i}><line x1={pl} x2={W-pr} y1={y} y2={y} stroke={C.line}/><text x={pl-8} y={y+3} textAnchor="end" fontSize="9.5" fill={C.ink3} className="num">{g}L</text></g>;})}
    {data.map((d,i)=><text key={i} x={xs(i)} y={H-8} textAnchor="middle" fontSize="10" fill={C.ink3}>{d.m}</text>)}
    {[["exp",C.ink3],["profit",C.ok],["rev",C.accent]].map(([k,col])=><path key={k} d={path(k)} fill="none" stroke={col} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>)}
    {data.map((d,i)=><circle key={i} cx={xs(i)} cy={ys(d.rev)} r="2.6" fill={C.accent}/>)}
  </svg>
  <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:6}}>{[["Revenue",C.accent],["Expenses",C.ink3],["Profit",C.ok]].map(([l,c])=><span key={l} style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:11.5,color:C.ink2}}><span style={{width:14,height:2.5,background:c,borderRadius:2}}/>{l}</span>)}</div></div>;
}
function Spark({pts,color=C.accent}){const W=110,H=30,max=Math.max(...pts),min=Math.min(...pts);
  const xs=i=>i/(pts.length-1)*W,ys=v=>H-2-((v-min)/((max-min)||1))*(H-4);
  return <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`}><path d={pts.map((p,i)=>`${i?"L":"M"}${xs(i).toFixed(1)},${ys(p).toFixed(1)}`).join(" ")} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>;}

        {exp_&&<tr><td colSpan={9} style={{padding:0,borderBottom:`1px solid ${C.line}`,background:"#FBFBF9"}}><div style={{padding:"14px 16px"}}>
          <div style={{display:"flex",gap:4,marginBottom:12,borderBottom:`1px solid ${C.line}`}}>{["Overview","Resources","Finance"].map(t=><button key={t} className="tab" onClick={()=>setTab(t)} style={{border:"none",background:"none",cursor:"pointer",padding:"7px 11px",fontSize:12.5,fontWeight:tab===t?600:500,color:tab===t?C.ink:C.ink3,borderBottom:`2px solid ${tab===t?C.ink:"transparent"}`,marginBottom:-1}}>{t}</button>)}</div>

          {tab==="Resources"&&(roster.length===0?<div style={{fontSize:13,color:C.ink3}}>No resources allocated.</div>:
            <table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr><th style={th}>Resource</th><th style={th}>Designation</th><th style={th}>Timesheet</th></tr></thead>
              <tbody>{roster.map(id=><tr key={id} className="row"><td style={{...td,color:C.ink}}>{empName(id,people)}</td><td style={td}>{empRole(id,people)}</td><td style={td}>{TS[id]?<Tag s={TS[id]} strong/>:<span style={{fontSize:12,color:C.ink3}}>—</span>}</td></tr>)}</tbody></table>)}
          {tab==="Finance"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            <div><div style={{fontSize:11,color:C.ink3,textTransform:"uppercase",letterSpacing:".05em",marginBottom:6}}>Revenue entries</div>
              {ledger.filter(f=>f.type==="Income"&&f.proj===p.id).map(f=><div key={f.id} style={{display:"flex",justifyContent:"space-between",fontSize:12.5,padding:"5px 0",borderBottom:`1px solid ${C.line}`}}><span style={{color:C.ink}}>{f.cat}<span style={{color:C.ink3}}> · {f.date}</span></span><span className="num" style={{color:C.ok}}>{inr(f.amt)}</span></div>)}
              {r===0&&<div style={{fontSize:12,color:C.ink3}}>No revenue recorded.</div>}</div>
            <div><div style={{fontSize:11,color:C.ink3,textTransform:"uppercase",letterSpacing:".05em",marginBottom:6}}>Expense entries</div>
              {ledger.filter(f=>f.type==="Expense"&&f.proj===p.id).map(f=><div key={f.id} style={{display:"flex",justifyContent:"space-between",fontSize:12.5,padding:"5px 0",borderBottom:`1px solid ${C.line}`}}><span style={{color:C.ink}}>{f.cat}<span style={{color:C.ink3}}> · {f.date}</span></span><span className="num" style={{color:C.ink2}}>−{inr(f.amt)}</span></div>)}
              {e===0&&<div style={{fontSize:12,color:C.ink3}}>No expenses recorded.</div>}</div>
            <div style={{gridColumn:"1 / -1",display:"flex",gap:24,paddingTop:10,borderTop:`1px solid ${C.lineStrong}`}}>
              {[["Total revenue",inr(r),C.ink],["Total expense",inr(e),C.ink],["Net profit",inr(pf),pf>=0?C.ok:C.err]].map(([k,v,col])=><div key={k}><div style={{fontSize:10.5,color:C.ink3,textTransform:"uppercase"}}>{k}</div><div className="num" style={{fontSize:15,color:col,fontWeight:600,marginTop:2}}>{v}</div></div>)}
            </div></div>}
        </div></td></tr>}
      </React.Fragment>;})}</tbody></table></div>
  </Panel>;
}

/* ── PM OVERSIGHT ────────────────────────────────────────────────── */

        </div>}

/* ── 2+6. PEOPLE (user management + directory) ───────────────────── */
function People({people,setPeople,show,q}){
  const [dept,setDept]=useState("All departments");const [role,setRole]=useState("All roles");const [stat,setStat]=useState("All statuses");const [av,setAv]=useState("All availability");
  const [add,setAdd]=useState(false);const [edit,setEdit]=useState(null);const [view,setView]=useState(null);
  const [exportEmployee,setExportEmployee]=useState(null); // 'all' | employee_object | null
  const [exportMonth,setExportMonth]=useState("June 2026");

  const handleExportTimesheets = () => {
    const monthMap = {
      "January": 0, "February": 1, "March": 2, "April": 3, "May": 4, "June": 5,
      "July": 6, "August": 7, "September": 8, "October": 9, "November": 10, "December": 11
    };
    const [monthStr, yearStr] = exportMonth.split(" ");
    const targetMonth = monthMap[monthStr];
    const targetYear = parseInt(yearStr, 10);

    const getEmpName = (empId) => (people.find(p => p.id === empId) || {}).name || empId;
    
    const csvRows = [
      ["Employee ID", "Employee Name", "Project Name", "Date", "Hours Logged", "Work Description", "Timesheet Status"]
    ];

    const parseLogDate = (dateStr) => {
      const parts = dateStr.split(" ");
      const day = parseInt(parts[0], 10);
      const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      const mIdx = months.indexOf(parts[1]);
      return new Date(2026, mIdx >= 0 ? mIdx : 5, day);
    };

    Object.keys(WORKLOG).forEach(empId => {
      if (exportEmployee !== "all" && empId !== exportEmployee.id) return;
      const logs = WORKLOG[empId] || [];
      
      logs.forEach(logEntry => {
        const entryDate = parseLogDate(logEntry.date);
        
        if (entryDate.getMonth() === targetMonth && entryDate.getFullYear() === targetYear) {
          const formattedDate = entryDate.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
          const projName = (PROJECTS.find(p => p.id === logEntry.proj) || {}).name || logEntry.proj;
          csvRows.push([
            empId,
            getEmpName(empId),
            projName,
            formattedDate,
            logEntry.h.toString(),
            (logEntry.d || "").replace(/"/g, '""'),
            TS[empId] || "Submitted"
          ]);
        }
      });
    });

    if (csvRows.length === 1) {
      const displayTargetName = exportEmployee === "all" ? "any resources" : exportEmployee.name;
      show(`No timesheet entries found for ${displayTargetName} in ${exportMonth}`);
      return;
    }

    const csvContent = "\uFEFF" + csvRows.map(e => e.map(val => `"${val}"`).join(",")).join("\n");
    const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.setAttribute("href", url);
    const filename = exportEmployee === "all"
      ? `timesheets_export_${exportMonth.replace(" ", "_").toLowerCase()}.csv`
      : `timesheet_${exportEmployee.id}_${exportMonth.replace(" ", "_").toLowerCase()}.csv`;
    link.setAttribute("download", filename);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    
    const displayTargetNameMsg = exportEmployee === "all" ? "All active resources" : exportEmployee.name;
    show(`Timesheets exported for ${displayTargetNameMsg} (${exportMonth})`);
    setExportEmployee(null);
  };

  const depts=["All departments",...Array.from(new Set(people.map(p=>p.dept)))];
  const list=people.filter(p=>(dept==="All departments"||p.dept===dept)&&(role==="All roles"||p.role===role)&&(stat==="All statuses"||p.status===stat)&&(av==="All availability"||avail(p.util)===av)&&matches(q,p.name,p.id,p.designation,p.dept,p.project));
  return <>
    <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14,alignItems:"center"}}>
      <Select value={dept} onChange={setDept} opts={depts}/><Select value={role} onChange={setRole} opts={["All roles",...ROLES]}/>
      <Select value={stat} onChange={setStat} opts={["All statuses","Active","Inactive"]}/>
      <Select value={av} onChange={setAv} opts={["All availability","Available","Partially Allocated","Fully Allocated","Overallocated"]}/>
      <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:12,color:C.ink3}}>{list.length} of {people.length}</span>
        <button className="ghost" style={{...btnGhost,padding:"7px 12px"}} onClick={()=>setExportEmployee("all")}><Icon n="download" size={14} color={C.ink2}/> Export Timesheets</button>
        <button className="primary" style={{...btnPrimary,padding:"7px 12px"}} onClick={()=>setAdd(true)}><Icon n="plus" size={14} color="#fff"/> Add employee</button></div></div>
    <Panel pad={false}><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",minWidth:900}}>
      <thead><tr><th style={th}>Employee</th><th style={th}>Dept</th><th style={th}>Designation</th><th style={th}>Role</th><th style={th}>Current project</th><th style={th}>Availability</th><th style={th}>Timesheet</th><th style={th}>Manager</th><th style={th}>Status</th><th style={{...th,textAlign:"right"}}></th></tr></thead>
      <tbody>{list.map(p=><tr key={p.id} className="row" style={{opacity:p.status==="Inactive"?.55:1}}>
        <td style={{...td,color:C.ink,fontWeight:500}}>{p.name}<div style={{fontSize:11,color:C.ink3,fontWeight:400}} className="num">{p.id} · joined {p.joined}</div></td>
        <td style={td}>{p.dept}</td><td style={td}>{p.designation}</td><td style={td}><Tag s={p.role} strong/></td>
        <td style={td}>{p.project}<div style={{fontSize:11,color:C.ink3}}>last · {p.last}</div></td>
        <td style={td}>{p.role==="Resource"?<span style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:12,color:availTone(p.util)}}><Dot c={availTone(p.util)}/>{avail(p.util)} <span className="num" style={{color:C.ink3}}>· {p.util}%</span></span>:<span style={{fontSize:12,color:C.ink3}}>—</span>}</td>
        <td style={td}>{p.role==="Resource"&&TS[p.id]?<Tag s={TS[p.id]} strong/>:<span style={{fontSize:12,color:C.ink3}}>—</span>}</td>
        <td style={td}>{p.manager}</td>
        <td style={td}><Tag s={p.status}/></td>
        <td style={{...td,textAlign:"right",whiteSpace:"nowrap"}}>
          <button title="View" className="ghost" onClick={()=>setView(p)} style={{border:`1px solid ${C.line}`,background:C.surface,borderRadius:6,padding:6,cursor:"pointer",marginRight:6}}><Icon n="eye" size={13} color={C.ink2}/></button>
          <button title="Export" className="ghost" onClick={()=>setExportEmployee(p)} style={{border:`1px solid ${C.line}`,background:C.surface,borderRadius:6,padding:6,cursor:"pointer",marginRight:6}}><Icon n="download" size={13} color={C.ink2}/></button>
          <button title="Edit" className="ghost" onClick={()=>setEdit(p)} style={{border:`1px solid ${C.line}`,background:C.surface,borderRadius:6,padding:6,cursor:"pointer",marginRight:6}}><Icon n="edit" size={13} color={C.ink2}/></button>
          <button title={p.status==="Active"?"Deactivate":"Reactivate"} className="ghost" onClick={()=>{setPeople(people.map(x=>x.id===p.id?{...x,status:x.status==="Active"?"Inactive":"Active"}:x));show(p.status==="Active"?"Employee deactivated":"Employee reactivated");}} style={{border:`1px solid ${C.line}`,background:C.surface,borderRadius:6,padding:6,cursor:"pointer"}}><Icon n="ban" size={13} color={p.status==="Active"?C.err:C.ok}/></button></td></tr>)}</tbody></table></div></Panel>
    {add&&<EmployeeForm onClose={()=>setAdd(false)} onSave={e=>{setPeople([{...e,project:"—",last:"—",util:0},...people]);setAdd(false);show("Employee added");}}/>}
    {edit&&<EmployeeForm emp={edit} onClose={()=>setEdit(null)} onSave={e=>{setPeople(people.map(x=>x.id===edit.id?{...x,...e}:x));setEdit(null);show("Employee updated");}}/>}
    {view&&<PersonDetail p={view} onClose={()=>setView(null)} onExport={(emp)=>setExportEmployee(emp)}/>}
    {exportEmployee&&<Modal title={exportEmployee === "all" ? "Export resource timesheets" : `Export timesheet: ${exportEmployee.name}`} onClose={()=>setExportEmployee(null)}
      footer={<><button className="demo" style={btnGhost} onClick={()=>setExportEmployee(null)}>Cancel</button>
        <button className="primary" style={btnPrimary} onClick={handleExportTimesheets}><Icon n="download" size={14} color="#fff"/> Export CSV</button></>}>
      <div style={{fontSize:13,color:C.ink,marginBottom:14}}>Select the month to export timesheet logs for {exportEmployee === "all" ? "all active resources" : exportEmployee.name}:</div>
      <div style={{marginBottom:12}}><div style={{fontSize:12,color:C.ink2,marginBottom:6}}>Select Month</div>
        <select style={inputStyle} value={exportMonth} onChange={e=>setExportMonth(e.target.value)}>{["June 2026","July 2026","August 2026"].map(m=><option key={m} value={m}>{m}</option>)}</select></div>
    </Modal>}
  </>;
}
function PersonDetail({p,onClose,onExport}){
  const log=WORKLOG[p.id]||[];const isRes=p.role==="Resource";
  return <><div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(20,20,25,.18)",zIndex:80}}/>
    <aside style={{position:"fixed",top:0,right:0,height:"100%",width:440,maxWidth:"94%",background:C.surface,borderLeft:`1px solid ${C.line}`,zIndex:90,display:"flex",flexDirection:"column"}}>
      <div style={{padding:"16px 22px",borderBottom:`1px solid ${C.line}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:14,fontWeight:600,color:C.ink}}>{p.name}</div><div style={{fontSize:11.5,color:C.ink3}} className="num">{p.id}</div></div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <button className="ghost" onClick={()=>onExport(p)} title="Export Timesheet" style={{border:"none",background:"none",borderRadius:6,padding:5,cursor:"pointer",display:"flex"}}><Icon n="download" size={15} color={C.ink2}/></button>
          <button className="ghost" onClick={onClose} style={{border:"none",background:"none",borderRadius:6,padding:5,cursor:"pointer",display:"flex"}}><Icon n="x" size={16} color={C.ink2}/></button>
        </div></div>
      <div style={{padding:22,overflowY:"auto",flex:1}}>
        <div style={{fontSize:11,color:C.ink3,textTransform:"uppercase",letterSpacing:".05em",marginBottom:8}}>Overview</div>
        <dl style={{margin:"0 0 20px"}}>{[["Role",p.role],["Department",p.dept],["Designation",p.designation],["Manager",p.manager],["Current project",p.project],["Last project",p.last],["Joined",p.joined],["Status",p.status]].map(([k,v])=>
          <div key={k} style={{display:"flex",justifyContent:"space-between",gap:16,padding:"8px 0",borderBottom:`1px solid ${C.line}`,fontSize:13}}><dt style={{color:C.ink3}}>{k}</dt><dd style={{margin:0,color:C.ink,textAlign:"right"}}>{v}</dd></div>)}</dl>
        {isRes&&<>
          <div style={{display:"flex",gap:10,marginBottom:20}}>
            <div style={{flex:1,border:`1px solid ${C.line}`,borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:10.5,color:C.ink3,textTransform:"uppercase",letterSpacing:".04em"}}>Availability</div><div style={{fontSize:13.5,color:availTone(p.util),marginTop:3,display:"flex",alignItems:"center",gap:6}}><Dot c={availTone(p.util)}/>{avail(p.util)}</div></div>
            <div style={{flex:1,border:`1px solid ${C.line}`,borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:10.5,color:C.ink3,textTransform:"uppercase",letterSpacing:".04em"}}>This week</div><div style={{marginTop:5}}>{TS[p.id]?<Tag s={TS[p.id]} strong/>:<span style={{fontSize:12,color:C.ink3}}>—</span>}</div></div></div>
          <div style={{fontSize:11,color:C.ink3,textTransform:"uppercase",letterSpacing:".05em",marginBottom:8}}>Work log · audit trail</div>
          {log.length===0?<Empty msg="No work entries logged this week."/>:
            <div style={{border:`1px solid ${C.line}`,borderRadius:8,overflow:"hidden"}}>{log.map((e,i)=><div key={i} style={{padding:"11px 13px",borderBottom:i<log.length-1?`1px solid ${C.line}`:"none"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",gap:10,marginBottom:3}}><span style={{fontSize:12.5,fontWeight:600,color:C.ink}}>{projName(e.proj)}</span><span className="num" style={{fontSize:12,color:C.ink2}}>{e.date} · {e.h}h</span></div>
              <div style={{fontSize:12.5,color:C.ink2,lineHeight:1.5}}>{e.d}</div></div>)}</div>}
        </>}
        {!isRes&&<div style={{fontSize:12.5,color:C.ink3}}>Timesheet monitoring applies to delivery resources.</div>}

    <div style={{display:"flex",gap:12}}><div style={{flex:1}}><Field label="Employee name"><input style={inputStyle} value={f.name} onChange={e=>set("name",e.target.value)}/></Field></div>

/* ── 3. ACCESS CONTROL (Detailed Roles & Access) ────────────────────── */
function Access({ show }) {
  const [rolePerms, setRolePerms] = useState(loadRolePermissions);
  const [selectedRole, setSelectedRole] = useState("finance");
  const [collapsedSections, setCollapsedSections] = useState({});
  const [isEditingName, setIsEditingName] = useState(false);
  const [tempName, setTempName] = useState("");

  const rolesList = ["finance", "hr", "project manager", "sales", "resources"];
  const activePerms = rolePerms[selectedRole] || {};

  const handleToggle = (permKey) => {
    setRolePerms(prev => {
      const next = {
        ...prev,
        [selectedRole]: {
          ...prev[selectedRole],
          [permKey]: !prev[selectedRole]?.[permKey]
        }
      };
      return next;
    });
  };

  const handleSectionAll = (sectionKey, value) => {
    const section = ACCESS_SECTIONS.find(s => s.key === sectionKey);
    if (!section) return;

    setRolePerms(prev => {
      const updatedRolePerms = { ...prev[selectedRole] };
      section.permissions.forEach(p => {
        updatedRolePerms[p.key] = value;
      });

      return {
        ...prev,
        [selectedRole]: updatedRolePerms
      };
    });
  };

  const handleSave = () => {
    saveRolePermissions(rolePerms);
    window.dispatchEvent(new Event("perms_changed"));
    show("Role permissions saved successfully!");
  };

  const handleCancel = () => {
    setRolePerms(loadRolePermissions());
    show("Changes discarded");
  };

  const handleEditName = () => {
    setTempName(activePerms.name || selectedRole.toUpperCase());
    setIsEditingName(true);
  };

  const handleSaveName = () => {
    if (!tempName.trim()) return;
    setRolePerms(prev => ({
      ...prev,
      [selectedRole]: {
        ...prev[selectedRole],
        name: tempName.trim()
      }
    }));
    setIsEditingName(false);
  };

  const handleCancelEditName = () => {
    setIsEditingName(false);
  };

  const toggleSectionCollapse = (sectionKey) => {
    setCollapsedSections(prev => ({
      ...prev,
      [sectionKey]: !prev[sectionKey]
    }));
  };

  return (
    <div style={{ display: "flex", gap: 24, minHeight: 500, background: C.surface, border: `1px solid ${C.line}`, borderRadius: 10, padding: 24 }} className="fade-in">
      {/* Left panel: List of roles */}
      <div style={{ width: 220, borderRight: `1px solid ${C.line}`, paddingRight: 16, display: "flex", flexDirection: "column", gap: 8 }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: C.ink3, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 4 }}>Roles</div>
        {rolesList.map(roleKey => {
          const roleData = rolePerms[roleKey] || DEFAULT_ROLE_PERMS[roleKey] || {};
          const active = selectedRole === roleKey;
          return (
            <button
              key={roleKey}
              onClick={() => {
                setSelectedRole(roleKey);
                setIsEditingName(false);
              }}
              style={{
                border: "none",
                background: active ? C.accentSoft : "transparent",
                color: active ? C.accent : C.ink2,
                fontWeight: active ? 600 : 500,
                textAlign: "left",
                padding: "10px 14px",
                fontSize: 13.5,
                cursor: "pointer",
                borderRadius: 6,
                display: "flex",
                alignItems: "center",
                justifyContent: "space-between",
                outline: "none"
              }}
            >
              <span>{roleData.name || roleKey.toUpperCase()}</span>
              <Icon n="right" size={12} color={active ? C.accent : C.ink3} />
            </button>
          );
        })}
      </div>

      {/* Right panel: Permissions Editor */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 20 }}>
        {/* Role Details */}
        <div style={{ borderBottom: `1px solid ${C.line}`, paddingBottom: 16 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 6 }}>
            {isEditingName ? (
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <input
                  type="text"
                  value={tempName}
                  onChange={e => setTempName(e.target.value)}
                  style={{
                    border: `1px solid ${C.lineStrong}`,
                    borderRadius: 6,
                    padding: "4px 8px",
                    fontSize: 18,
                    fontWeight: 700,
                    color: C.ink,
                    outline: "none",
                    background: C.paper
                  }}
                />
                <button
                  onClick={handleSaveName}
                  style={{
                    border: "none",
                    background: C.ok,
                    color: "#fff",
                    borderRadius: 6,
                    padding: "4px 10px",
                    cursor: "pointer",
                    fontSize: 12,
                    fontWeight: 600
                  }}
                >
                  Save
                </button>
                <button
                  onClick={handleCancelEditName}
                  style={{
                    border: "none",
                    background: "transparent",
                    color: C.ink2,
                    cursor: "pointer",
                    fontSize: 12
                  }}
                >
                  Cancel
                </button>
              </div>
            ) : (
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <h3 style={{ fontSize: 18, fontWeight: 700, color: C.ink, margin: 0 }}>
                  {activePerms.name || selectedRole.toUpperCase()}
                </h3>
                <button
                  onClick={handleEditName}
                  style={{
                    border: "none",
                    background: "none",
                    color: C.accent,
                    cursor: "pointer",
                    fontSize: 11,
                    fontWeight: 600,
                    padding: "2px 6px",
                    borderRadius: 4,
                    textTransform: "uppercase"
                  }}
                >
                  Edit
                </button>
              </div>
            )}
          </div>
          <p style={{ fontSize: 13, color: C.ink2, margin: 0 }}>
            {activePerms.desc || DEFAULT_ROLE_PERMS[selectedRole]?.desc || ""}
          </p>
        </div>

        {/* Access Management sections */}
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: C.ink3, textTransform: "uppercase", letterSpacing: "0.05em" }}>
            Access Management
          </div>

          {ACCESS_SECTIONS.map(section => {
            const isCollapsed = !!collapsedSections[section.key];
            return (
              <div
                key={section.key}
                style={{
                  border: `1px solid ${C.line}`,
                  borderRadius: 8,
                  overflow: "hidden"
                }}
              >
                {/* Section Header */}
                <div
                  style={{
                    background: C.paper,
                    padding: "10px 14px",
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "space-between",
                    borderBottom: isCollapsed ? "none" : `1px solid ${C.line}`
                  }}
                >
                  <div
                    onClick={() => toggleSectionCollapse(section.key)}
                    style={{
                      display: "flex",
                      alignItems: "center",
                      gap: 8,
                      cursor: "pointer",
                      userSelect: "none"
                    }}
                  >
                    <Icon n={isCollapsed ? "right" : "down"} size={14} color={C.ink2} />
                    <span style={{ fontSize: 13.5, fontWeight: 600, color: C.ink }}>
                      {section.label}
                    </span>
                  </div>

                  <div style={{ display: "flex", gap: 12 }}>
                    <button
                      onClick={() => handleSectionAll(section.key, true)}
                      style={{
                        border: "none",
                        background: "none",
                        color: C.accent,
                        fontSize: 11.5,
                        fontWeight: 600,
                        cursor: "pointer",
                        padding: 0
                      }}
                    >
                      Full Access
                    </button>
                    <button
                      onClick={() => handleSectionAll(section.key, false)}
                      style={{
                        border: "none",
                        background: "none",
                        color: C.err,
                        fontSize: 11.5,
                        fontWeight: 600,
                        cursor: "pointer",
                        padding: 0
                      }}
                    >
                      No Access
                    </button>
                  </div>
                </div>

                {/* Section Body (Grid of checkboxes) */}
                {!isCollapsed && (
                  <div
                    style={{
                      padding: 16,
                      background: C.surface,
                      display: "grid",
                      gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))",
                      gap: 12
                    }}
                  >
                    {section.permissions.map(p => {
                      const checked = !!activePerms[p.key];
                      return (
                        <label
                          key={p.key}
                          style={{
                            display: "flex",
                            alignItems: "flex-start",
                            gap: 8,
                            cursor: "pointer",
                            fontSize: 12.5,
                            color: C.ink2,
                            userSelect: "none"
                          }}
                        >
                          <input
                            type="checkbox"
                            checked={checked}
                            onChange={() => handleToggle(p.key)}
                            style={{
                              marginTop: 2,
                              cursor: "pointer"
                            }}
                          />
                          <span>{p.label}</span>
                        </label>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* Footer controls */}
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 12, borderTop: `1px solid ${C.line}`, paddingTop: 16, marginTop: 12 }}>
          <button
            onClick={handleCancel}
            style={{
              border: `1px solid ${C.lineStrong}`,
              background: "transparent",
              borderRadius: 6,
              padding: "8px 16px",
              cursor: "pointer",
              fontSize: 13,
              fontWeight: 500,
              color: C.ink2
            }}
          >
            Cancel
          </button>
          <button
            onClick={handleSave}
            style={{
              border: "none",
              background: C.ink,
              color: "#fff",
              borderRadius: 6,
              padding: "8px 16px",
              cursor: "pointer",
              fontSize: 13,
              fontWeight: 600
            }}
          >
            Save Changes
          </button>
        </div>
      </div>
    </div>
  );
}

      {list.length===0?<Empty msg="No clients match the current filters."/>:
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr><th style={th}>Client</th><th style={th}>Industry</th><th style={th}>Primary contact</th><th style={th}>Country</th><th style={{...th,textAlign:"right"}}>Projects</th><th style={{...th,textAlign:"right"}}>Active</th><th style={{...th,textAlign:"right"}}>Net profit</th><th style={{...th,textAlign:"right"}}></th></tr></thead>
        <tbody>{list.map(c=>{const s=clientStats(c);const rev=s.ps.reduce((a,p)=>a+ledger.filter(f=>f.type==="Income"&&f.proj===p.id).reduce((x,f)=>x+f.amt,0),0);const exp=s.ps.reduce((a,p)=>a+ledger.filter(f=>f.type==="Expense"&&f.proj===p.id).reduce((x,f)=>x+f.amt,0),0);
          return <tr key={c.id} className="row" style={{opacity:c.status==="Inactive"?.6:1}}>
          <td style={{...td,color:C.ink,fontWeight:500}}>{c.name}</td><td style={td}>{c.industry}</td><td style={td}>{c.contact}</td><td style={td}>{c.country}</td>
          <td className="num" style={{...td,textAlign:"right"}}>{s.total}</td><td className="num" style={{...td,textAlign:"right",color:s.active?C.ok:C.ink3}}>{s.active}</td>
          <td className="num" style={{...td,textAlign:"right",color:rev-exp>=0?C.ok:C.err,fontWeight:500}}>{s.total?inrC(rev-exp):"—"}</td>
          <td style={{...td,textAlign:"right"}}><button className="lnk" onClick={()=>setOpen(c)} style={{border:"none",background:"none",color:C.ink2,fontSize:12.5,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:5}}>View <Icon n="right" size={13} color={C.ink3}/></button></td></tr>;})}</tbody></table>}
    </Panel>
    {open&&<ClientDetail client={open} ledger={ledger} onClose={()=>setOpen(null)}/>}
  </>;
}
function ClientDetail({client,ledger,onClose}){
  const ps=PROJECTS.filter(p=>p.client===client.name);
  const entries=ledger.filter(f=>ps.some(p=>p.id===f.proj));
  const rev=entries.filter(f=>f.type==="Income").reduce((s,f)=>s+f.amt,0);
  const exp=entries.filter(f=>f.type==="Expense").reduce((s,f)=>s+f.amt,0);
  const resources=ps.reduce((s,p)=>s+p.resources,0);
  const timeline=[...entries.map(f=>({t:`${f.type==="Income"?"Revenue":"Expense"} added — ${f.cat} (${inrC(f.amt)})`,d:f.date,c:f.type==="Income"?C.ok:C.ink3})),...ps.map(p=>({t:`Project created — ${p.name}`,d:"—",c:C.accent}))];
  return <><div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(20,20,25,.18)",zIndex:80}}/>
    <aside style={{position:"fixed",top:0,right:0,height:"100%",width:480,maxWidth:"94%",background:C.surface,borderLeft:`1px solid ${C.line}`,zIndex:90,display:"flex",flexDirection:"column"}}>
      <div style={{padding:"16px 22px",borderBottom:`1px solid ${C.line}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:14,fontWeight:600,color:C.ink}}>{client.name}</span>
        <button className="ghost" onClick={onClose} style={{border:"none",background:"none",borderRadius:6,padding:5,cursor:"pointer"}}><Icon n="x" size={16} color={C.ink2}/></button></div>
      <div style={{padding:22,overflowY:"auto",flex:1}}>
        <div style={{fontSize:11,color:C.ink3,textTransform:"uppercase",letterSpacing:".05em",marginBottom:8}}>Overview</div>
        <dl style={{margin:"0 0 22px"}}>{[["Contact",client.contact],["Email",client.email],["Phone",client.phone],["Website",client.website],["Industry",client.industry],["Country",client.country]].map(([k,v])=>
          <div key={k} style={{display:"flex",justifyContent:"space-between",gap:16,padding:"8px 0",borderBottom:`1px solid ${C.line}`,fontSize:13}}><dt style={{color:C.ink3}}>{k}</dt><dd style={{margin:0,color:C.ink,textAlign:"right"}}>{v||"—"}</dd></div>)}</dl>

        <div style={{fontSize:11,color:C.ink3,textTransform:"uppercase",letterSpacing:".05em",marginBottom:8}}>Financial summary</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:22}}>
          {[["Revenue",inrC(rev),C.ink],["Expenses",inrC(exp),C.ink],["Net profit",inrC(rev-exp),rev-exp>=0?C.ok:C.err]].map(([k,v,col])=><div key={k} style={{border:`1px solid ${C.line}`,borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:10.5,color:C.ink3,textTransform:"uppercase",letterSpacing:".04em"}}>{k}</div><div className="num" style={{fontSize:15,color:col,marginTop:3,fontWeight:600}}>{v}</div></div>)}</div>

        <div style={{fontSize:11,color:C.ink3,textTransform:"uppercase",letterSpacing:".05em",marginBottom:8}}>Projects ({ps.length}) · {resources} resources</div>
        {ps.length===0?<Empty msg="No projects yet for this client."/>:
          <table style={{width:"100%",borderCollapse:"collapse",marginBottom:22}}><thead><tr><th style={th}>Project</th><th style={th}>PM</th><th style={th}>Status</th><th style={{...th,textAlign:"right"}}>Profit</th></tr></thead>
            <tbody>{ps.map(p=>{const r=ledger.filter(f=>f.type==="Income"&&f.proj===p.id).reduce((a,f)=>a+f.amt,0),e=ledger.filter(f=>f.type==="Expense"&&f.proj===p.id).reduce((a,f)=>a+f.amt,0);return <tr key={p.id} className="row"><td style={{...td,color:C.ink}}>{p.name}</td><td style={td}>{p.pm}</td><td style={td}><Tag s={p.status} strong/></td><td className="num" style={{...td,textAlign:"right",color:r-e>=0?C.ok:C.err}}>{inrC(r-e)}</td></tr>;})}</tbody></table>}

        <div style={{fontSize:11,color:C.ink3,textTransform:"uppercase",letterSpacing:".05em",marginBottom:8}}>Activity timeline</div>
        <div>{timeline.map((e,i)=><div key={i} style={{display:"flex",gap:10,padding:"8px 0",borderBottom:i<timeline.length-1?`1px solid ${C.line}`:"none"}}><span style={{marginTop:5}}><Dot c={e.c}/></span><div style={{fontSize:12.5,color:C.ink}}>{e.t}<span style={{color:C.ink3}} className="num"> · {e.d}</span></div></div>)}</div>
      </div>
    </aside></>;
}

/* ── shell ───────────────────────────────────────────────────────── */
const TABS = [
  ["Business", "bars", "viewDashboard"],
  ["Finance", "wallet", "viewFinanceModule"],
  ["Clients", "building", "viewProjects"],
  ["Projects", "folder", "viewProjects"],
  ["PMs", "brief", "viewProjects"],
  ["People", "users", "viewHRModule"],
  ["Sales", "trend", "viewIncentives"],
  ["Vendor Resources", "globe", "viewHRModule"],
  ["Access", "shield", "viewRoles"]
];

function Dashboard({ currentUser, onLogout, toast, show }) {
  const [rolePerms, setRolePerms] = useState(loadRolePermissions);
  const [q, setQ] = useState("");
  const [people, setPeople] = useState(PEOPLE0);
  const [ledger, setLedger] = useState(FINANCE0);
  const [profileOpen, setProfileOpen] = useState(false);
  const [notifOpen, setNotifOpen] = useState(false);

  useEffect(() => {
    const handlePermsChange = () => {
      setRolePerms(loadRolePermissions());
    };
    window.addEventListener("perms_changed", handlePermsChange);
    return () => window.removeEventListener("perms_changed", handlePermsChange);
  }, []);

  const hasPerm = (permissionKey) => {
    if (currentUser.role === "Admin") return true;
    const roleKey = currentUser.role.toLowerCase();
    return rolePerms[roleKey]?.[permissionKey] ?? DEFAULT_ROLE_PERMS[roleKey]?.[permissionKey] ?? false;
  };

  const visibleTabs = TABS.filter(([_, __, permKey]) => hasPerm(permKey));

  const [tab, setTab] = useState(() => {
    return visibleTabs.length > 0 ? visibleTabs[0][0] : "Business";
  });

  const initials = currentUser.name.split(" ").map(n => n[0]).join("");

  return (
    <div className="pulse-root" style={{ minHeight: "100vh", background: "#F8FAFC", display: "flex" }}>
      {/* Left Sidebar */}
      <aside style={{
        width: 240,
        background: "#0B1930",
        color: "#fff",
        display: "flex",
        flexDirection: "column",
        flexShrink: 0,
        borderRight: "1px solid rgba(255,255,255,0.08)"
      }}>
        {/* Sidebar Header */}
        <div style={{
          height: 58,
          padding: "0 20px",
          display: "flex",
          alignItems: "center",
          justifyContent: "space-between",
          borderBottom: "1px solid rgba(255,255,255,0.08)"
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 28, height: 28, borderRadius: 7, background: "rgba(255,255,255,0.1)", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <Icon n="shield" size={15} color="#fff" />
            </div>
            <span style={{ fontSize: 15, fontWeight: 700, letterSpacing: "-0.02em" }}>Company Portal</span>
          </div>
          <button style={{ border: "none", background: "none", cursor: "pointer", padding: 0, display: "flex", opacity: 0.5 }}>
            <Icon n="left" size={14} color="#fff" />
          </button>
        </div>

        {/* Sidebar Navigation Items */}
        <div style={{ flex: 1, padding: "16px 12px", display: "flex", flexDirection: "column", gap: 4, overflowY: "auto" }}>
          {visibleTabs.map(([label, icon]) => {
            const active = tab === label;
            return (
              <button
                key={label}
                onClick={() => {
                  setTab(label);
                  setQ("");
                }}
                style={{
                  border: "none",
                  background: active ? "rgba(255,255,255,0.08)" : "transparent",
                  cursor: "pointer",
                  padding: "10px 12px",
                  fontSize: 13,
                  fontWeight: active ? 600 : 500,
                  color: active ? "#ffffff" : "rgba(255,255,255,0.65)",
                  borderRadius: 6,
                  display: "flex",
                  alignItems: "center",
                  gap: 10,
                  textAlign: "left",
                  outline: "none",
                  transition: "background 0.15s, color 0.15s"
                }}
                className="sidebar-item"
              >
                <Icon n={icon} size={15} color={active ? "#ffffff" : "rgba(255,255,255,0.65)"} />
                <span>{label}</span>
              </button>
            );
          })}
        </div>

        {/* Sidebar Footer Profile */}
        <div style={{
          padding: "16px 20px",
          borderTop: "1px solid rgba(255,255,255,0.08)",
          display: "flex",
          alignItems: "center",
          justifyContent: "space-between",
          gap: 8
        }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 4, overflow: "hidden", flex: 1 }}>
            <span style={{ fontSize: 13, fontWeight: 500, color: "#fff", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }} title={currentUser.email}>
              {currentUser.email}
            </span>
            <span style={{
              alignSelf: "flex-start",
              fontSize: 10,
              fontWeight: 700,
              color: "#1E429F",
              background: "#E1EFFE",
              padding: "2px 6px",
              borderRadius: 4,
              textTransform: "uppercase"
            }}>
              {currentUser.role || "ADMIN"}
            </span>
          </div>
          <button
            onClick={onLogout}
            style={{
              border: "none",
              background: "none",
              cursor: "pointer",
              padding: 4,
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              borderRadius: 4,
              color: "rgba(255,255,255,0.65)",
              transition: "color 0.15s"
            }}
            title="Log out"
          >
            <Icon n="logout" size={16} />
          </button>
        </div>
      </aside>

      {/* Main Content Area */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
        {/* Main Area Header */}
        <header style={{ background: C.surface, borderBottom: `1px solid ${C.line}`, padding: "0 28px", height: 58, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 16, position: "sticky", top: 0, zIndex: 30 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <h1 style={{ fontSize: 18, fontWeight: 700, color: C.ink, margin: 0 }}>{tab}</h1>
          </div>

          <div style={{ flex: 1, maxWidth: 400, display: "flex", alignItems: "center", gap: 8, border: `1px solid ${C.line}`, borderRadius: 7, padding: "8px 12px", background: C.surface }}>
            <Icon n="search" size={15} color={C.ink3} />
            <input value={q} onChange={e => setQ(e.target.value)} placeholder="Search..." style={{ border: "none", outline: "none", fontSize: 13, color: C.ink, background: "transparent", width: "100%" }} />
            {q && (
              <button onClick={() => setQ("")} style={{ border: "none", background: "none", cursor: "pointer", padding: 0, display: "flex" }}>
                <Icon n="x" size={14} color={C.ink3} />
              </button>
            )}
          </div>

          <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
            <span style={{ fontSize: 12, color: C.ink3 }}>FY 2025–26 · Q2</span>
            <div style={{ position: "relative" }}>
              <button className="ghost" onClick={() => setNotifOpen(o => !o)} style={{ ...navBtn, position: "relative" }}>
                <Icon n="bell" size={17} color={C.ink2} />
                <span style={{ position: "absolute", top: 3, right: 3, width: 7, height: 7, borderRadius: 99, background: C.accent, border: `1.5px solid ${C.surface}` }} />
              </button>
              {notifOpen && (
                <>
                  <div onClick={() => setNotifOpen(false)} style={{ position: "fixed", inset: 0, zIndex: 40 }} />
                  <div style={{ position: "absolute", right: 0, top: 38, width: 320, background: C.surface, border: `1px solid ${C.line}`, borderRadius: 10, boxShadow: "0 8px 30px rgba(0,0,0,.12)", zIndex: 50, overflow: "hidden" }}>
                    <div style={{ padding: "11px 14px", borderBottom: `1px solid ${C.line}`, fontSize: 12.5, fontWeight: 600, color: C.ink }}>Notifications</div>
                    {NOTIFS.map((n, i) => (
                      <div key={i} style={{ padding: "11px 14px", borderBottom: i < NOTIFS.length - 1 ? `1px solid ${C.line}` : "none", display: "flex", gap: 10 }}>
                        <span style={{ marginTop: 5 }}><Dot c={n.tone} /></span>
                        <div>
                          <div style={{ fontSize: 12.5, color: C.ink, lineHeight: 1.4 }}>{n.t}</div>
                          <div style={{ fontSize: 11, color: C.ink3, marginTop: 2 }}>{n.time}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </>
              )}
            </div>
            <button onClick={() => setProfileOpen(true)} style={{ width: 30, height: 30, borderRadius: 99, background: C.ink, color: "#fff", fontSize: 11, fontWeight: 600, border: "none", cursor: "pointer" }}>
              {initials}
            </button>
          </div>
        </header>

        {/* Main Content Body */}
        <main style={{ maxWidth: 1180, margin: "0 auto", padding: "24px 28px", width: "100%" }}>
          {tab === "Business" && <Business people={people} />}
          {tab === "Finance" && <Finance ledger={ledger} setLedger={setLedger} show={show} q={q} />}
          {tab === "Projects" && <Projects ledger={ledger} people={people} q={q} />}
          {tab === "PMs" && <PMs people={people} q={q} />}
          {tab === "Clients" && <Clients ledger={ledger} show={show} q={q} />}
          {tab === "People" && <People people={people} setPeople={setPeople} show={show} q={q} />}
          {tab === "Sales" && <Sales q={q} />}
          {tab === "Vendor Resources" && <Outsourced q={q} />}
          {tab === "Access" && <Access show={show} />}
        </main>
      </div>

      {profileOpen && <Profile currentUser={currentUser} onClose={() => setProfileOpen(false)} onLogout={onLogout} />}
      {toast}
    </div>
  );
}
const navBtn = { width: 30, height: 30, border: "none", background: "none", borderRadius: 6, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" };

function App() {
  const [currentUser, setCurrentUser] = useState(null);
  const [toast, show] = useToast();

  const handleLogin = (email) => {
    const user = PEOPLE0.find(p => p.email === email || p.id === email || (email === "admin@pulseorganizer.io" && p.id === "EMP-1014"));
    if (user) {
      setCurrentUser(user);
    } else {
      setCurrentUser(PEOPLE0.find(p => p.id === "EMP-1014"));
    }
  };

  if (!currentUser) return <><style>{sheet}</style><Login onLogin={handleLogin} /></>;
  return <><style>{sheet}</style><Dashboard currentUser={currentUser} onLogout={() => setCurrentUser(null)} toast={toast} show={show} /></>;
}
const s=document.createElement("style");s.textContent=sheet;document.head.appendChild(s);
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
