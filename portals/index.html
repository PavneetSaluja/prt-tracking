<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Your Workspace — Learnify</title>
  <meta name="description" content="Enter your organisation's workspace to continue to Learnify." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ===== Page Wrapper ===== -->
  <div class="page-wrapper" role="main">

    <!-- ===== Top Branding Section ===== -->
    <section class="top-section" aria-label="Branding">

      <!-- Language Selector -->
      <div class="lang-bar">
        <button
          id="lang-btn"
          class="lang-btn"
          aria-label="Select language: English"
          aria-expanded="false"
          aria-haspopup="listbox"
          type="button"
        >
          <!-- Globe icon -->
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          English
          <!-- Chevron down -->
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
               stroke-linejoin="round" aria-hidden="true">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
      </div>

      <!-- Logo Placeholder -->
      <div class="logo-wrapper" role="img" aria-label="Your logo placeholder">
        <div class="logo-icon" aria-hidden="true">
          <!-- Image / photo placeholder icon -->
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
               stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
        <div class="logo-text-block">
          <span class="logo-label">YOUR LOGO</span>
          <span class="logo-sub">Any orientation</span>
        </div>
      </div>

      <!-- Heading & Description -->
      <div class="branding-heading">
        <h1>
          Welcome to Your
          <span class="highlight">Learning Platform</span>
        </h1>
      </div>
      <p class="branding-desc">
        A complete solution for courses, assessments,<br />
        and certificates — all in one place.
      </p>

    </section>
    <!-- /top-section -->

    <!-- ===== Form Card ===== -->
    <div class="form-card" role="region" aria-label="Verify Workspace Form">

      <!-- Card Heading -->
      <div class="card-heading">
        <h2>Verify Your Workspace</h2>
      </div>
      <p class="card-desc">Enter your organisation's workspace to continue.</p>

      <!-- Form -->
      <form id="verify-form" novalidate aria-label="Workspace verification">

        <!-- Domain Input -->
        <div class="form-group">
          <label class="form-label" for="domain-input">Domain name</label>
          <div
            id="domain-wrapper"
            class="domain-input-wrapper"
          >
            <input
              id="domain-input"
              type="text"
              placeholder="Domain name"
              autocomplete="off"
              spellcheck="false"
              aria-describedby="domain-error"
              aria-required="true"
            />
            <span class="domain-suffix" aria-label="Domain suffix">.app.learnify.ing</span>
          </div>
          <p id="domain-error" class="error-msg" role="alert" aria-live="polite"></p>
        </div>

        <!-- Continue Button -->
        <div class="form-group mb-0 mt-24">
          <button
            id="continue-btn"
            class="btn-primary"
            type="submit"
            aria-label="Continue to login"
          >
            Continue
          </button>
        </div>

      </form>

    </div>
    <!-- /form-card -->

  </div>
  <!-- /page-wrapper -->

  <script src="js/script.js"></script>
</body>
</html>
